<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="theme-color" content="#080808"/>
<title>HeyMax Logo Generator</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  /* HeyMax brand tokens */
  --neutral-000:#FFFFFF;
  --neutral-005:#F4F4F4;
  --neutral-020:#F4F3F6;
  --neutral-040:#E9E8EB;
  --neutral-060:#C9C4D4;
  --neutral-080:#514C56;
  --neutral-090:#313131;
  --neutral-100:#1A1A1A;
  --brand-040:#D8C1FF;
  --brand-060:#6E1FFF;
  --brand-080:#4000B8;
  --brand-100:#21005E;
  --teal-040:#C0FAFF;
  --teal-060:#00E3FD;

/* UI mapping */
–bg:#080808;
–panel:var(–neutral-000);
–panel-surface:var(–neutral-005);
–border:var(–neutral-040);
–border-subtle:var(–neutral-020);
–text-primary:var(–neutral-100);
–text-secondary:var(–neutral-080);
–text-muted:var(–neutral-060);
–accent:var(–brand-060);
–accent-dark:var(–brand-080);
–sans:‘Plus Jakarta Sans’,sans-serif;
–panel-h:340px;
}

html,body{width:100%;height:100%;overflow:hidden;background:var(–bg);touch-action:none}
#root{width:100%;height:100%;display:flex;flex-direction:column}

/* Canvas */
.canvas-wrap{flex:1;position:relative;overflow:hidden;min-height:0}
.canvas-wrap canvas{display:block;width:100%!important;height:100%!important}

/* Sheet */
.sheet{
background:var(–panel);
border-top:1px solid var(–border);
flex-shrink:0;display:flex;flex-direction:column;
transition:height 0.3s cubic-bezier(0.4,0,0.2,1);
}
.sheet-handle{
width:100%;padding:10px 0 4px;display:flex;justify-content:center;cursor:pointer;flex-shrink:0;
}
.sheet-pill{width:32px;height:3px;border-radius:2px;background:var(–neutral-040)}

/* Tabs */
.tabs{display:flex;padding:0 16px;gap:0;flex-shrink:0;border-bottom:1px solid var(–border)}
.tab{
flex:1;padding:11px 4px;
font-family:var(–sans);font-size:11px;font-weight:500;
color:var(–text-muted);background:none;border:none;cursor:pointer;
border-bottom:2px solid transparent;transition:color 0.15s,border-color 0.15s;
white-space:nowrap;
}
.tab.active{color:var(–accent);border-bottom-color:var(–accent)}
.tab:hover:not(.active){color:var(–text-secondary)}

/* Tab content */
.tab-content{flex:1;overflow-y:auto;padding:16px 16px 24px;-webkit-overflow-scrolling:touch}
.tab-content::-webkit-scrollbar{width:3px}
.tab-content::-webkit-scrollbar-track{background:transparent}
.tab-content::-webkit-scrollbar-thumb{background:var(–border);border-radius:2px}

/* Desktop */
@media(min-width:768px){
#root{flex-direction:row}
.canvas-wrap{flex:1}
.sheet{
width:288px;flex-shrink:0;height:100%!important;
border-top:none;border-left:1px solid var(–border);flex-direction:column;
}
.sheet-handle{display:none}
.tabs{
padding:16px 16px 0;flex-direction:column;
border-bottom:none;border-right:none;gap:2px;
}
.tab{
flex:none;text-align:left;padding:9px 12px;
border-bottom:none;border-left:2px solid transparent;
border-radius:0 6px 6px 0;
}
.tab.active{
background:rgba(110,31,255,0.06);
border-bottom:none;border-left-color:var(–accent);color:var(–accent);
}
.tab-content{padding:16px 16px 32px}
}

/* Section label */
.label{
font-family:var(–sans);font-size:10px;font-weight:600;letter-spacing:0.06em;
color:var(–text-muted);text-transform:uppercase;margin-bottom:10px;display:block;
}
.sublabel{
font-family:var(–sans);font-size:10px;font-weight:500;
color:var(–text-muted);margin-bottom:8px;margin-top:14px;display:block;
}
.hr{border:none;border-top:1px solid var(–border-subtle);margin:14px 0}

/* Slider */
.slider-row{margin-bottom:16px}
.slider-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:7px}
.slider-lbl{
font-family:var(–sans);font-size:12px;font-weight:500;
color:var(–text-secondary);
}
.slider-val{
font-family:var(–sans);font-size:11px;font-weight:400;
color:var(–text-muted);
}
input[type=range]{
width:100%;height:3px;accent-color:var(–accent);
cursor:pointer;border-radius:2px;
}

/* Toggle */
.toggle-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.toggle-lbl{
font-family:var(–sans);font-size:12px;font-weight:500;
color:var(–text-secondary);
}
.toggle-track{
width:40px;height:22px;border-radius:11px;cursor:pointer;position:relative;
transition:background 0.2s,border 0.2s;flex-shrink:0;border:1.5px solid;
}
.toggle-thumb{
position:absolute;top:3px;width:14px;height:14px;border-radius:50%;
transition:left 0.2s,background 0.2s;
}

/* Color sections */
.color-section{margin-bottom:16px}
.panel-label{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.panel-tag{
font-family:var(–sans);font-size:11px;font-weight:600;
color:var(–text-secondary);
}
.panel-preview{flex:1;height:3px;border-radius:2px}
.edge-row{display:flex;gap:8px;margin-bottom:8px}
.edge-block{flex:1}
.edge-label{
font-family:var(–sans);font-size:10px;font-weight:500;
color:var(–text-muted);margin-bottom:5px;display:block;
}
.color-btn{
width:100%;height:38px;border-radius:8px;border:2px solid transparent;
cursor:pointer;display:flex;align-items:center;justify-content:center;
font-family:var(–sans);font-size:10px;font-weight:500;
letter-spacing:0.02em;transition:border-color 0.12s,transform 0.1s;
}
.color-btn:hover{border-color:rgba(255,255,255,0.4)!important}
.color-btn:active{transform:scale(0.96)}

/* Color picker modal */
.modal-overlay{
position:fixed;inset:0;z-index:100;background:rgba(26,26,26,0.7);
backdrop-filter:blur(4px);
display:flex;align-items:flex-end;justify-content:center;
padding-bottom:env(safe-area-inset-bottom);
}
@media(min-width:768px){.modal-overlay{align-items:center}}
.modal-box{
background:var(–neutral-000);
border-radius:16px 16px 0 0;border:1px solid var(–border);
padding:20px 16px 32px;width:100%;max-width:480px;max-height:80vh;overflow-y:auto;
box-shadow:0 -4px 32px rgba(0,0,0,0.12);
}
@media(min-width:768px){.modal-box{border-radius:12px;padding:20px;box-shadow:0 8px 40px rgba(0,0,0,0.16)}}
.modal-title{
font-family:var(–sans);font-size:13px;font-weight:600;
color:var(–text-primary);margin-bottom:16px;
}
.modal-group-label{
font-family:var(–sans);font-size:10px;font-weight:600;letter-spacing:0.05em;
text-transform:uppercase;color:var(–text-muted);
margin-bottom:8px;margin-top:16px;
}
.color-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
.color-swatch{
aspect-ratio:1;border-radius:8px;cursor:pointer;border:2px solid transparent;
transition:transform 0.1s,border-color 0.1s;
}
.color-swatch:hover{transform:scale(1.08)}
.color-swatch:active{transform:scale(0.9)}
.color-swatch.selected{border-color:var(–brand-060);box-shadow:0 0 0 2px var(–brand-040)}

/* Preset grid */
.preset-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.preset-btn{
height:56px;border-radius:10px;border:2px solid transparent;cursor:pointer;
position:relative;overflow:hidden;transition:border-color 0.12s,transform 0.1s;
}
.preset-btn:hover{transform:scale(1.02)}
.preset-btn:active{transform:scale(0.97)}
.preset-btn.active{border-color:rgba(255,255,255,0.6)}
.preset-name{
position:absolute;bottom:6px;left:9px;
font-family:var(–sans);font-size:9px;font-weight:600;letter-spacing:0.04em;
color:rgba(255,255,255,0.85);text-shadow:0 1px 3px rgba(0,0,0,0.3);
}

/* BG switch */
.bg-switch{
display:flex;background:var(–panel-surface);
border-radius:8px;padding:3px;gap:2px;margin-bottom:16px;
border:1px solid var(–border);
}
.bg-opt{
flex:1;padding:7px 0;
font-family:var(–sans);font-size:11px;font-weight:500;
border:none;cursor:pointer;border-radius:6px;transition:all 0.15s;
}

/* Export */
.export-btn{
width:100%;padding:12px;border-radius:8px;
border:1.5px solid var(–border);background:var(–panel-surface);
font-family:var(–sans);font-size:12px;font-weight:500;
cursor:pointer;color:var(–text-secondary);margin-bottom:10px;
transition:all 0.15s;
}
.export-btn:hover{border-color:var(–neutral-060);color:var(–text-primary);background:var(–neutral-000)}
.export-btn:active{transform:scale(0.98)}
.export-btn.primary{
border-color:var(–accent);background:rgba(110,31,255,0.06);
color:var(–accent);font-weight:600;
}
.export-btn.primary:hover{background:rgba(110,31,255,0.12)}

/* Canvas badge */
.canvas-info{position:absolute;top:16px;left:16px;pointer-events:none}
.canvas-badge{
font-family:var(–sans);font-size:11px;font-weight:500;
color:rgba(255,255,255,0.35);
}
.anim-dot{
display:inline-block;width:6px;height:6px;border-radius:50%;
background:var(–brand-040);margin-right:6px;vertical-align:middle;
animation:pulse 1.2s ease-in-out infinite;
}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.2}}

/* Export overlay */
.export-overlay{
position:fixed;inset:0;z-index:200;background:rgba(26,26,26,0.92);
backdrop-filter:blur(8px);
display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:24px;
}
.export-preview{max-width:100%;max-height:55vh;border-radius:12px;border:1px solid var(–border);box-shadow:0 16px 64px rgba(0,0,0,0.4)}
.export-actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.export-link{
font-family:var(–sans);font-size:12px;font-weight:500;
color:var(–neutral-000);text-decoration:none;
border:1.5px solid rgba(255,255,255,0.2);border-radius:8px;
padding:10px 22px;background:rgba(255,255,255,0.08);
transition:background 0.15s,border-color 0.15s;
}
.export-link:hover{background:rgba(255,255,255,0.14);border-color:rgba(255,255,255,0.4)}
.export-close{
font-family:var(–sans);font-size:11px;font-weight:400;
color:rgba(255,255,255,0.3);cursor:pointer;margin-top:4px;
}

/* Loading */
.loading{
position:fixed;inset:0;background:var(–neutral-005);
display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:300;
}
.loading-logo{font-family:var(–sans);font-size:36px;font-weight:500;color:var(–neutral-060)}
.loading-logo b{font-weight:700;color:var(–neutral-090)}
.loading-bar{width:120px;height:2px;background:var(–border);border-radius:1px}
.loading-fill{height:100%;background:var(–accent);border-radius:1px;width:0%;transition:width 0.3s}
.loading-text{
font-family:var(–sans);font-size:11px;font-weight:400;
color:var(–text-muted);letter-spacing:0.02em;
}

/* Logo preview bar */
.logo-bar{
position:absolute;top:0;left:0;right:0;height:88px;
display:flex;align-items:center;
padding:0 16px;gap:0;
pointer-events:none;z-index:10;
}
.logo-bar-inner{
display:flex;align-items:center;
height:56px;
pointer-events:auto;
}
.logo-shape-canvas{
display:block;height:56px;width:56px;flex-shrink:0;
border-radius:6px;overflow:hidden;
}
.logo-text-svg{
display:block;height:56px;flex-shrink:0;
/* width is computed from viewBox aspect ratio */
}
.logo-dl-btn{
position:absolute;top:16px;right:16px;
font-family:var(–sans);font-size:11px;font-weight:500;
color:rgba(255,255,255,0.8);
background:rgba(0,0,0,0.35);backdrop-filter:blur(6px);
border:1px solid rgba(255,255,255,0.18);
border-radius:6px;padding:6px 14px;cursor:pointer;pointer-events:auto;
transition:background 0.15s;text-decoration:none;
}
.logo-dl-btn:hover{background:rgba(0,0,0,0.6)}
.logo-dl-btn.on-light{color:rgba(0,0,0,0.7);background:rgba(255,255,255,0.65);border-color:rgba(0,0,0,0.1)}
.logo-dl-btn.on-light:hover{background:rgba(255,255,255,0.92)}

/* Font color chips (brand only) */
.font-color-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px}
.font-color-chip{
width:28px;height:28px;border-radius:6px;cursor:pointer;
border:2px solid transparent;transition:transform 0.1s,border-color 0.1s;
flex-shrink:0;
}
.font-color-chip:hover{transform:scale(1.12)}
.font-color-chip.selected{border-color:var(–accent);box-shadow:0 0 0 2px var(–brand-040)}
.dual-track{position:relative;height:24px;margin-bottom:4px;cursor:ew-resize}
.dual-base{position:absolute;top:50%;transform:translateY(-50%);left:0;right:0;height:3px;background:var(–border);border-radius:2px}
.dual-fill{position:absolute;top:50%;transform:translateY(-50%);height:3px;background:var(–accent);border-radius:2px;pointer-events:none}
.dual-handle{
position:absolute;top:50%;transform:translate(-50%,-50%);
width:16px;height:16px;border-radius:50%;cursor:ew-resize;
touch-action:none;transition:transform 0.1s;
}
.dual-handle:hover{transform:translate(-50%,-50%) scale(1.25)}
.dual-handle.lo{background:var(–neutral-000);border:2px solid var(–neutral-060);box-shadow:0 1px 4px rgba(0,0,0,0.12)}
.dual-handle.hi{background:var(–accent);border:2px solid var(–brand-080);box-shadow:0 1px 4px rgba(110,31,255,0.3)}
</style>

</head>

function makeGradTex(cA, cB) {
  const cv = document.createElement("canvas"); cv.width=512; cv.height=4;
  const ctx = cv.getContext("2d");
  const g = ctx.createLinearGradient(0,0,512,0);
  g.addColorStop(0, cA); g.addColorStop(1, cB);
  ctx.fillStyle=g; ctx.fillRect(0,0,512,4);
  const t = new THREE.CanvasTexture(cv);
  t.wrapS = t.wrapT = THREE.ClampToEdgeWrapping;
  return t;
}

function remapUVs(geo, axis, u0, u1) {
  const pos=geo.attributes.position, uvs=new Float32Array(pos.count*2);
  let mn=Infinity, mx=-Infinity;
  for(let i=0;i<pos.count;i++){const d=axis===0?pos.getX(i):pos.getY(i);if(d<mn)mn=d;if(d>mx)mx=d;}
  const dR=mx-mn||1;
  for(let i=0;i<pos.count;i++){const d=axis===0?pos.getX(i):pos.getY(i);uvs[i*2]=u0+((d-mn)/dR)*(u1-u0);uvs[i*2+1]=0.5;}
  geo.setAttribute("uv",new THREE.BufferAttribute(uvs,2));
}

function roundedRect(w,h,r){
  const s=new THREE.Shape();
  const sr=Math.min(r,w/2-0.01,h/2-0.01);
  s.moveTo(-w/2+sr,-h/2);s.lineTo(w/2-sr,-h/2);
  s.quadraticCurveTo(w/2,-h/2,w/2,-h/2+sr);s.lineTo(w/2,h/2-sr);
  s.quadraticCurveTo(w/2,h/2,w/2-sr,h/2);s.lineTo(-w/2+sr,h/2);
  s.quadraticCurveTo(-w/2,h/2,-w/2,h/2-sr);s.lineTo(-w/2,-h/2+sr);
  s.quadraticCurveTo(-w/2,-h/2,-w/2+sr,-h/2);
  return s;
}

function tiltedPanel(w,h,r,center,xA,yA,mat,uvAxis,u0,u1){
  const geo=new THREE.ShapeGeometry(roundedRect(w,h,r),48);
  remapUVs(geo,uvAxis,u0,u1);
  const mesh=new THREE.Mesh(geo,mat);
  const zA=new THREE.Vector3().crossVectors(xA,yA).normalize();
  const m4=new THREE.Matrix4();
  m4.makeBasis(xA.clone().normalize(),yA.clone().normalize(),zA);
  m4.setPosition(center); mesh.matrix.copy(m4); mesh.matrixAutoUpdate=false;
  return mesh;
}

function buildShape(group,{spacing,length,plateWidth,angle,radius,panelColors}){
  const dead=[];
  group.traverse(o=>{if(o.isMesh)dead.push(o);});
  dead.forEach(o=>{o.geometry.dispose();if(o.material?.map)o.material.map.dispose();o.material?.dispose();group.remove(o);});
  const H=spacing/2,W=plateWidth/2,R=radius;
  const Ht=(Math.min(angle,90)/90)*plateWidth*0.98;
  const slant=Math.sqrt(Ht*Ht+H*H);
  const pm=(a,b)=>new THREE.MeshBasicMaterial({map:makeGradTex(a,b),side:THREE.DoubleSide});
  const [cAB,cDC,cDC2,cEF,cEF2,cGH,cGH2,cJI]=panelColors;
  // R1
  const g1=new THREE.ShapeGeometry(roundedRect(plateWidth,length,R),48);
  remapUVs(g1,0,0,1);
  const m1=new THREE.Mesh(g1,pm(cAB,cDC));m1.rotation.x=-Math.PI/2;m1.position.y=H;group.add(m1);

  group.add(tiltedPanel(length,slant,R,new THREE.Vector3(W-Ht/2,H/2,0),
    new THREE.Vector3(0,0,1),new THREE.Vector3(-Ht,-H,0).normalize(),pm(cDC2,cEF),1,0,1));
  // R3
  group.add(tiltedPanel(length,slant,R,new THREE.Vector3(W-Ht/2,-H/2,0),
    new THREE.Vector3(0,0,1),new THREE.Vector3(Ht,-H,0).normalize(),pm(cEF2,cGH),1,0,1));
  // R4
  const g4=new THREE.ShapeGeometry(roundedRect(plateWidth,length,R),48);
  remapUVs(g4,0,0,1);
  const m4=new THREE.Mesh(g4,pm(cGH2,cJI));m4.rotation.x=-Math.PI/2;m4.position.y=-H;group.add(m4);
}

function SliderRow({label,value,min,max,step,unit="",onChange}){
  const fmt=v=>unit==="°"?Math.round(v)+"°":typeof v==="number"?v.toFixed(2):v;
  return(
    <div className="slider-row">
      <div className="slider-header">
        <span className="slider-lbl">{label}</span>
        <span className="slider-val">{fmt(value)}</span>
      </div>
      <input type="range" min={min} max={max} step={step} value={value} onChange={e=>onChange(parseFloat(e.target.value))}/>
    </div>
  );
}

function DualSlider({label,absMin,absMax,step,lo,hi,onLo,onHi,unit=""}){
  const trackRef=useRef(null);
  const dragging=useRef(null);
  const pLo=((lo-absMin)/(absMax-absMin))*100;
  const pHi=((hi-absMin)/(absMax-absMin))*100;
  const snap=v=>Math.round(v/step)*step;
  const posToVal=useCallback(cx=>{
    const r=trackRef.current.getBoundingClientRect();
    const t=Math.max(0,Math.min(1,(cx-r.left)/r.width));
    return snap(absMin+t*(absMax-absMin));
  },[absMin,absMax,step]);
  const move=useCallback(e=>{
    if(!dragging.current)return;
    const cx=e.touches?e.touches[0].clientX:e.clientX;
    const v=posToVal(cx);
    if(dragging.current==="lo")onLo(Math.min(v,hi-step));
    else onHi(Math.max(v,lo+step));
  },[lo,hi,step,posToVal,onLo,onHi]);
  const up=useCallback(()=>{
    dragging.current=null;
    window.removeEventListener("pointermove",move);
    window.removeEventListener("pointerup",up);
    window.removeEventListener("touchmove",move);
    window.removeEventListener("touchend",up);
  },[move]);
  const down=(h)=>(e)=>{
    e.preventDefault();
    dragging.current=h;
    window.addEventListener("pointermove",move);
    window.addEventListener("pointerup",up);
  };
  const fmt=v=>unit==="°"?Math.round(v)+"°":v.toFixed(2);
  return(
    <div className="slider-row">
      <div className="slider-header">
        <span className="slider-lbl">{label}</span>
        <span className="slider-val">{fmt(lo)}<span style={{color:"#282828"}}> – </span>{fmt(hi)}</span>
      </div>
      <div ref={trackRef} className="dual-track">
        <div className="dual-base"/>
        <div className="dual-fill" style={{left:`${pLo}%`,width:`${pHi-pLo}%`}}/>
        <div className="dual-handle lo" style={{left:`${pLo}%`}} onPointerDown={down("lo")}/>
        <div className="dual-handle hi" style={{left:`${pHi}%`}} onPointerDown={down("hi")}/>
      </div>
    </div>
  );
}

function ColorEditor({panelColors,onChange}){
  const [modal,setModal]=useState(null);
  const [cAB,cDC,cDC2,cEF,cEF2,cGH,cGH2,cJI]=panelColors;
  const panels=[
    {id:"R1",ea:"ab",eb:"dc",a:cAB,b:cDC,ia:0,ib:1},
    {id:"R2",ea:"dc",eb:"ef",a:cDC2,b:cEF,ia:2,ib:3},
    {id:"R3",ea:"ef",eb:"gh",a:cEF2,b:cGH,ia:4,ib:5},
    {id:"R4",ea:"gh",eb:"ji",a:cGH2,b:cJI,ia:6,ib:7},
  ];
  const setColor=(i,c)=>{const n=[...panelColors];n[i]=c;onChange(n);};
  const isLight=hex=>{
    const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
    return 0.299*r+0.587*g+0.114*b>140;
  };
  return(
    <>
      {panels.map(({id,ea,eb,a,b,ia,ib})=>(
        <div key={id} className="color-section">
          <div className="panel-label">
            <span className="panel-tag">{id}</span>
            <div className="panel-preview" style={{background:`linear-gradient(90deg,${a},${b})`}}/>
          </div>
          <div className="edge-row">
            <div className="edge-block">
              <div className="edge-label">[{ea}]</div>
              <div className="color-btn" style={{background:a,color:isLight(a)?"#111":"#fff"}}
                onClick={()=>setModal({i:ia,label:`${id} · [${ea}]`})}>
                {a.toUpperCase()}
              </div>
            </div>
            <div className="edge-block">
              <div className="edge-label">[{eb}]</div>
              <div className="color-btn" style={{background:b,color:isLight(b)?"#111":"#fff"}}
                onClick={()=>setModal({i:ib,label:`${id} · [${eb}]`})}>
                {b.toUpperCase()}
              </div>
            </div>
          </div>
        </div>
      ))}
      <button onClick={()=>{
        const r=[...panelColors].reverse();onChange(r);
      }} style={{width:"100%",fontFamily:"var(--mono)",fontSize:9,letterSpacing:"0.1em",
        textTransform:"uppercase",color:"var(--text3)",background:"none",
        border:"1px solid var(--border)",borderRadius:6,padding:"8px 0",cursor:"pointer",marginTop:4}}>
        ↔ Reverse
      </button>
      {modal&&<ColorModal title={modal.label} current={panelColors[modal.i]}
        onSelect={c=>setColor(modal.i,c)} onClose={()=>setModal(null)}/>}
    </>
  );
}

          <hr className="hr"/>
          <span className="label">Gradient</span>
          {["R1","R2","R3","R4"].map((p,pi)=>{
            const i=pi*2;
            const edges=[["ab","dc"],["dc","ef"],["ef","gh"],["gh","ji"]][pi];
            return(
              <div key={p} style={{marginBottom:10}}>
                <div style={{fontFamily:"var(--mono)",fontSize:7,color:"#2a2a2a",letterSpacing:"0.14em",textTransform:"uppercase",marginBottom:4}}>{p}</div>
                {[0,1].map(j=>(
                  <div key={j} style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
                    <div style={{width:12,height:12,borderRadius:3,background:spec.gradient[p][edges[j]],border:"1px solid #222",flexShrink:0}}/>
                    <span style={{fontFamily:"var(--mono)",fontSize:8,color:"var(--text3)",flex:1}}>[{edges[j]}]</span>
                    <span style={{fontFamily:"var(--mono)",fontSize:9,color:"#555"}}>{(spec.gradient[p][edges[j]]||"").toUpperCase()}</span>
                  </div>
                ))}
              </div>
            );
          })}
        </>
      )}
    </>
  );
}

// ═══════════════════════════════════════════
// MAIN APP
// ═══════════════════════════════════════════
function App(){
  const mountRef    = useRef(null);
  const groupRef    = useRef(null);
  const sceneRef    = useRef(null);
  const rendererRef = useRef(null);
  const cameraRef   = useRef(null);
  const rafRef      = useRef(null);
  const drag        = useRef({on:false,x:0,y:0,pinchD:0});
  const rot         = useRef({x:18*Math.PI/180,y:-33*Math.PI/180});
  const mouseRef    = useRef({x:0,y:0});
  const animRef     = useRef({on:false,mouse:false,speed:0.4,t:0,lastT:null});
  const aniRanges   = useRef({spacing:[1.5,4.5],angle:[5,80],width:[4.3,5.2],length:[2.7,3.25]});
  const params      = useRef({});

  // Shape
  const [spacing,    setSpacing]    = useState(3.0);
  const [length,     setLength]     = useState(2.90);
  const [plateWidth, setPlateWidth] = useState(4.80);
  const [angle,      setAngle]      = useState(38);
  const [radius,     setRadius]     = useState(0.50);
  const [rotX,       setRotX]       = useState(18);
  const [rotY,       setRotY]       = useState(-33);
  const [rotZ,       setRotZ]       = useState(0);
  const [bg,         setBg]         = useState("black");

  // Colors — default to Galaxy preset (purple gradient)
  const [panelColors, setPanelColors] = useState(PRESETS[1].colors);

  // Animation
  const [animOn,    setAnimOn]    = useState(false);
  const [mouseOn,   setMouseOn]   = useState(false);
  const [animSpeed, setAnimSpeed] = useState(0.4);
  const [aniSpacing, setAniSpacing] = useState([1.5,4.5]);
  const [aniAngle,   setAniAngle]   = useState([5,80]);
  const [aniWidth,   setAniWidth]   = useState([4.3,5.2]);
  const [aniLength,  setAniLength]  = useState([2.7,3.25]);

  // UI
  const [tab,        setTab]        = useState("colors");
  const [sheetOpen,  setSheetOpen]  = useState(false);
  const [exportImg,  setExportImg]  = useState(null);
  const [spec,       setSpec]       = useState(null);
  const [loading,    setLoading]    = useState(true);
  const [fontColor,  setFontColor]  = useState("#FFFFFF");

  // Logo preview — two separate elements: shape canvas + SVG text
  const logoShapeRef = useRef(null); // small canvas showing 3D shape
  const renderLogoRef = useRef(null);

  // Copy a square crop of the main WebGL canvas → the small shape preview canvas
  const renderLogoShape = useCallback(() => {
    const sc = logoShapeRef.current;
    const r3 = rendererRef.current;
    if (!sc || !r3) return;
    const dpr = window.devicePixelRatio || 1;
    const SIZE = 56 * dpr; // 56 CSS px at device resolution
    if (sc.width !== SIZE || sc.height !== SIZE) {
      sc.width = SIZE; sc.height = SIZE;
      sc.style.width  = "56px";
      sc.style.height = "56px";
    }
    const ctx = sc.getContext("2d");
    const src = r3.domElement;
    // Square-crop from centre of WebGL canvas
    const dim = Math.min(src.width, src.height);
    const sx  = (src.width  - dim) / 2;
    const sy  = (src.height - dim) / 2;
    ctx.clearRect(0, 0, SIZE, SIZE);
    ctx.drawImage(src, sx, sy, dim, dim, 0, 0, SIZE, SIZE);
  }, []);

  useEffect(() => { renderLogoRef.current = renderLogoShape; }, [renderLogoShape]);

  // Re-render shape preview after any param change
  useEffect(() => {
    requestAnimationFrame(() => renderLogoShape());
  }, [bg, panelColors, spacing, length, plateWidth, angle, radius, renderLogoShape]);

  // Download: composite shape canvas + SVG text onto an offscreen canvas
  const downloadLogo = useCallback(() => {
    const sc  = logoShapeRef.current;
    const r3  = rendererRef.current;
    if (!sc || !r3 || !sceneRef.current || !cameraRef.current) return;

    r3.render(sceneRef.current, cameraRef.current);

    const CSS_H = 120; // export height in CSS px
    const dpr   = window.devicePixelRatio || 1;
    const H     = CSS_H * dpr;
    const tSc   = H / SVG_H;
    const gap   = HALF_M_RATIO * SVG_W * tSc;
    const W     = Math.ceil(H + gap + SVG_W * tSc);

    const out = document.createElement("canvas");
    out.width = W; out.height = H;
    const ctx = out.getContext("2d");

    // Background
    const bgHex = BG_OPTS.find(o => o.value === bg)?.color ?? "#080808";
    ctx.fillStyle = bgHex;
    ctx.fillRect(0, 0, W, H);

    // Shape: square-crop from main renderer
    const src = r3.domElement;
    const dim = Math.min(src.width, src.height);
    const sx  = (src.width  - dim) / 2;
    const sy  = (src.height - dim) / 2;
    ctx.drawImage(src, sx, sy, dim, dim, 0, 0, H, H);

    // HeyMax text via Path2D
    const path2d = new Path2D(HEYMAX_PATH);
    ctx.save();
    ctx.translate(H + gap, (H - SVG_H * tSc) / 2);
    ctx.scale(tSc, tSc);
    ctx.fillStyle = fontColor;
    ctx.fill(path2d);
    ctx.restore();

    // Download
    const url = out.toDataURL("image/png");
    const a = document.createElement("a");
    a.href = url; a.download = "heymax-logo.png";
    document.body.appendChild(a); a.click();
    document.body.removeChild(a);
  }, [bg, fontColor]);

  // Sync anim ranges
  useEffect(()=>{ aniRanges.current.spacing=aniSpacing; },[aniSpacing]);
  useEffect(()=>{ aniRanges.current.angle=aniAngle; },[aniAngle]);
  useEffect(()=>{ aniRanges.current.width=aniWidth; },[aniWidth]);
  useEffect(()=>{ aniRanges.current.length=aniLength; },[aniLength]);

  // Build params + rebuild shape
  useEffect(()=>{
    params.current={spacing,length,plateWidth,angle,radius,panelColors};
    if(groupRef.current&&!animRef.current.on){
      buildShape(groupRef.current,params.current);
      // Re-render logo shape preview after shape changes
      requestAnimationFrame(()=>{ if(renderLogoRef.current) renderLogoRef.current(); });
    }
  },[spacing,length,plateWidth,angle,radius,panelColors]);

  // Rotation sliders → group
  useEffect(()=>{
    const rx=rotX*Math.PI/180,ry=rotY*Math.PI/180;
    rot.current={x:rx,y:ry};
    if(groupRef.current&&!animRef.current.on){groupRef.current.rotation.x=rx;groupRef.current.rotation.y=ry;}
  },[rotX,rotY]);
  useEffect(()=>{
    if(groupRef.current)groupRef.current.rotation.z=rotZ*Math.PI/180;
  },[rotZ]);

  // Background
  useEffect(()=>{
    if(sceneRef.current)sceneRef.current.background=new THREE.Color(BG_OPTS.find(o=>o.value===bg).color);
  },[bg]);

  // Presets
  const applyPreset=useCallback(p=>{setPanelColors(p.colors);setBg(p.bg);},[]);

  // Scene init
  useEffect(()=>{
    const el=mountRef.current;
    const scene=new THREE.Scene();
    scene.background=new THREE.Color(0x080808);
    sceneRef.current=scene;
    const camera=new THREE.PerspectiveCamera(36,el.clientWidth/el.clientHeight,0.1,100);
    camera.position.set(0,1,15);camera.lookAt(0,0,0);
    cameraRef.current=camera;
    const renderer=new THREE.WebGLRenderer({antialias:true,preserveDrawingBuffer:true});
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(el.clientWidth,el.clientHeight);
    el.appendChild(renderer.domElement);
    rendererRef.current=renderer;
    const group=new THREE.Group();
    group.rotation.x=rot.current.x;group.rotation.y=rot.current.y;
    scene.add(group);groupRef.current=group;
    buildShape(group,params.current);
    setLoading(false);
    // Trigger first shape preview after first frame renders
    setTimeout(() => { if (renderLogoRef.current) renderLogoRef.current(); }, 300);

    const lerp=(a,b,t)=>a+(b-a)*t;
    const wave=(t,f,p)=>(Math.sin(t*f+p)+1)/2;

    const hexLerp=(a,b,f)=>{
      const rA=parseInt(a.slice(1,3),16),gA=parseInt(a.slice(3,5),16),bA=parseInt(a.slice(5,7),16);
      const rB=parseInt(b.slice(1,3),16),gB=parseInt(b.slice(3,5),16),bB=parseInt(b.slice(5,7),16);
      return '#'+[Math.round(rA+f*(rB-rA)),Math.round(gA+f*(gB-gA)),Math.round(bA+f*(bB-bA))].map(v=>v.toString(16).padStart(2,'0')).join('');
    };

    // Animate colors by breathing between adjacent stops in the current palette
    // Each of the 8 stops oscillates gently toward its neighbour with a unique phase
    const animColors=(t)=>{
      const c=params.current.panelColors;
      if(!c||c.length<8)return c;
      const n=c.length;
      return c.map((col,i)=>{
        const next=c[(i+1)%n];
        // Each stop has its own slow frequency + phase so they never all sync
        const w=wave(t,0.12+i*0.03, i*0.8);
        return hexLerp(col,next,w*0.55); // max 55% blend so stays recognisable
      });
    };

    const animate=(ts)=>{
      rafRef.current=requestAnimationFrame(animate);
      const anim=animRef.current;
      if(anim.on){
        if(anim.lastT===null)anim.lastT=ts;
        const dt=(ts-anim.lastT)/1000;anim.lastT=ts;anim.t+=dt*anim.speed;
        const t=anim.t,R=aniRanges.current;
        const newSpacing=lerp(R.spacing[0],R.spacing[1],wave(t,0.41,0));
        const newAngle=lerp(R.angle[0],R.angle[1],wave(t,0.27,2.1));
        const newWidth=lerp(R.width[0],R.width[1],wave(t,0.33,4.5));
        const newLength=lerp(R.length[0],R.length[1],wave(t,0.19,1.3));
        const mx=anim.mouse?mouseRef.current.x*0.4:0;
        const my=anim.mouse?mouseRef.current.y*0.3:0;
        if(group){
          group.rotation.x=rot.current.x+Math.sin(t*0.11)*0.12+my;
          group.rotation.y=rot.current.y+Math.sin(t*0.08)*0.18+mx;
        }
        buildShape(group,{...params.current,spacing:newSpacing,angle:newAngle,
          plateWidth:newWidth,length:newLength,
          panelColors:animColors(t)});
      } else {
        anim.lastT=null;
        if(anim.mouse&&group){
          group.rotation.x=rot.current.x+mouseRef.current.y*0.35;
          group.rotation.y=rot.current.y+mouseRef.current.x*0.5;
        } else if(group&&!drag.current.on){
          group.rotation.x=rot.current.x;group.rotation.y=rot.current.y;
        }
      }
      renderer.render(scene,camera);
    };
    animate(0);

    const onResize=()=>{camera.aspect=el.clientWidth/el.clientHeight;camera.updateProjectionMatrix();renderer.setSize(el.clientWidth,el.clientHeight);};
    const onWheel=e=>{e.preventDefault();camera.position.z=Math.max(3,Math.min(40,camera.position.z+e.deltaY*0.02));};
    const onMouseMove=e=>{if(!animRef.current.mouse)return;const r=el.getBoundingClientRect();mouseRef.current.x=((e.clientX-r.left)/r.width-0.5)*2;mouseRef.current.y=((e.clientY-r.top)/r.height-0.5)*2;};
    window.addEventListener("resize",onResize);
    el.addEventListener("wheel",onWheel,{passive:false});
    el.addEventListener("mousemove",onMouseMove);
    return()=>{cancelAnimationFrame(rafRef.current);window.removeEventListener("resize",onResize);el.removeEventListener("wheel",onWheel);el.removeEventListener("mousemove",onMouseMove);renderer.dispose();el.removeChild(renderer.domElement);};
  },[]);

  // Drag rotate
  const onPointerDown=useCallback(e=>{
    if(e.touches&&e.touches.length===2){
      drag.current.pinchD=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
      return;
    }
    const cx=e.touches?e.touches[0].clientX:e.clientX;
    const cy=e.touches?e.touches[0].clientY:e.clientY;
    drag.current={on:true,x:cx,y:cy,pinchD:0};
  },[]);
  const onPointerMove=useCallback(e=>{
    if(e.touches&&e.touches.length===2){
      const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
      if(drag.current.pinchD>0&&cameraRef.current){
        const delta=(drag.current.pinchD-d)*0.05;
        cameraRef.current.position.z=Math.max(3,Math.min(40,cameraRef.current.position.z+delta));
      }
      drag.current.pinchD=d;
      return;
    }
    if(!drag.current.on)return;
    const cx=e.touches?e.touches[0].clientX:e.clientX;
    const cy=e.touches?e.touches[0].clientY:e.clientY;
    rot.current.y+=(cx-drag.current.x)*0.007;
    rot.current.x+=(cy-drag.current.y)*0.007;
    drag.current={on:true,x:cx,y:cy,pinchD:0};
    if(groupRef.current&&!animRef.current.on){
      groupRef.current.rotation.x=rot.current.x;groupRef.current.rotation.y=rot.current.y;
    }
    setRotX(Math.round(rot.current.x*180/Math.PI));
    setRotY(Math.round(rot.current.y*180/Math.PI));
  },[]);
  const onPointerUp=useCallback(()=>{drag.current.on=false;},[]);

  // Logo download
  const downloadLogo = useCallback(() => {
    renderLogoPreview();
    setTimeout(() => {
      const lc = logoCanvasRef.current;
      if (!lc) return;
      const url = lc.toDataURL("image/png");
      const a = document.createElement("a");
      a.href = url; a.download = "heymax-logo.png";
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
    }, 150);
  }, [renderLogoPreview]);

  // Export
  const doExport=useCallback(()=>{
    const r=rendererRef.current;if(!r||!sceneRef.current||!cameraRef.current)return;
    r.render(sceneRef.current,cameraRef.current);
    const canvas=r.domElement,w=canvas.width,h=canvas.height;
    const png=canvas.toDataURL("image/png");
    const toBlob=d=>{const[hdr,dat]=d.split(",");const mime=hdr.match(/:(.*?);/)[1];const byt=atob(dat);const arr=new Uint8Array(byt.length);for(let i=0;i<byt.length;i++)arr[i]=byt.charCodeAt(i);return new Blob([arr],{type:mime});};
    const pngUrl=URL.createObjectURL(toBlob(png));
    const [cAB,cDC,cDC2,cEF,cEF2,cGH,cGH2,cJI]=panelColors;
    const specObj={generated:new Date().toISOString(),shape:{spacing,length,plateWidth,angle,radius},rotation:{x:Math.round(rotX),y:Math.round(rotY),z:Math.round(rotZ)},gradient:{R1:{ab:cAB,dc:cDC},R2:{dc:cDC2,ef:cEF},R3:{ef:cEF2,gh:cGH},R4:{gh:cGH2,ji:cJI}},background:bg};
    const svgStr=`<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="${w}" height="${h}"><image width="${w}" height="${h}" xlink:href="${png}"/></svg>`;
    const svgUrl=URL.createObjectURL(new Blob([svgStr],{type:"image/svg+xml"}));
    const jsonUrl=URL.createObjectURL(new Blob([JSON.stringify(specObj,null,2)],{type:"application/json"}));
    setExportImg({png,pngUrl,svgUrl,jsonUrl});setSpec(specObj);
    setTimeout(()=>{URL.revokeObjectURL(pngUrl);URL.revokeObjectURL(svgUrl);URL.revokeObjectURL(jsonUrl);},60000);
  },[spacing,length,plateWidth,angle,radius,rotX,rotY,rotZ,panelColors,bg]);

  const TABS=[{id:"colors",label:"Colors"},{id:"shape",label:"Shape"},{id:"anim",label:"Motion"},{id:"export",label:"Export"}];
  const isMobile=window.innerWidth<768;

  return(
    <>
      {loading&&(
        <div className="loading">
          <div className="loading-logo">Hey<b>Max</b></div>
          <div className="loading-bar"><div className="loading-fill" style={{width:"80%"}}/></div>
          <div className="loading-text">Loading generator&hellip;</div>
        </div>
      )}

      {/* Canvas */}
      <div className="canvas-wrap"
        onPointerDown={onPointerDown} onPointerMove={onPointerMove} onPointerUp={onPointerUp} onPointerLeave={onPointerUp}
        onTouchStart={onPointerDown} onTouchMove={onPointerMove} onTouchEnd={onPointerUp}
        style={{cursor:"crosshair",userSelect:"none",touchAction:"none"}}>
        <div ref={mountRef} style={{width:"100%",height:"100%"}}/>

        {/* Logo preview bar — shape canvas + SVG text as separate HTML elements */}
        <div className="logo-bar">
          <div className="logo-bar-inner">
            {/* 3D shape: small canvas copied from main renderer */}
            <canvas ref={logoShapeRef} className="logo-shape-canvas"/>
            {/* Spacer = half M width (M spans 141/714 of SVG width, scaled to 56px height) */}
            <div style={{width:`${Math.round((141.399/2/SVG_H)*56)}px`,flexShrink:0}}/>
            {/* HeyMax wordmark as inline SVG — always crisp, never scales wrong */}
            <svg viewBox={`0 0 ${SVG_W} ${SVG_H}`} height="56" style={{display:"block",flexShrink:0}}>
              <path d={HEYMAX_PATH} fill={fontColor}/>
            </svg>
          </div>
          <button className={`logo-dl-btn${bg==="white"||bg==="grey"?" on-light":""}`} onClick={downloadLogo}>
            ↓ Logo PNG
          </button>
        </div>

        <div className="canvas-info" style={{top:"76px"}}>
          {animOn&&<span className="anim-dot"/>}
          <span className="canvas-badge">HeyMax · Logo Generator</span>
        </div>
      </div>

      {/* Panel */}
      <div className="sheet" style={isMobile?{height:sheetOpen?`${window.innerHeight*0.6}px`:"var(--panel-h)"}:{}}>
        {isMobile&&(
          <div className="sheet-handle" onClick={()=>setSheetOpen(v=>!v)}>
            <div className="sheet-pill"/>
          </div>
        )}
        <div className="tabs">
          {TABS.map(t=>(
            <button key={t.id} className={`tab${tab===t.id?" active":""}`} onClick={()=>{setTab(t.id);if(isMobile)setSheetOpen(true);}}>
              {t.label}
            </button>
          ))}
        </div>
        <div className="tab-content">
          {tab==="colors"&&<>
            <PresetsTab panelColors={panelColors} onApply={applyPreset} bg={bg} onBg={setBg}/>
            <hr className="hr"/>
            <span className="label">Font Colour</span>
            <div className="font-color-row">
              {FONT_COLORS.map(({hex,label})=>(
                <div key={hex} className={`font-color-chip${fontColor===hex?" selected":""}`}
                  style={{background:hex,borderColor:fontColor===hex?"var(--accent)":"transparent"}}
                  title={label}
                  onClick={()=>setFontColor(hex)}/>
              ))}
            </div>
            <hr className="hr"/>
            <span className="label">Panel Colours</span>
            <ColorEditor panelColors={panelColors} onChange={setPanelColors}/>
          </>}
          {tab==="shape"&&<ShapeTab spacing={spacing} setSpacing={setSpacing} length={length} setLength={setLength}
            plateWidth={plateWidth} setPlateWidth={setPlateWidth} angle={angle} setAngle={setAngle}
            radius={radius} setRadius={setRadius} rotX={rotX} setRotX={setRotX} rotY={rotY} setRotY={setRotY} rotZ={rotZ} setRotZ={setRotZ}/>}
          {tab==="anim"&&<AnimTab animOn={animOn} setAnimOn={setAnimOn} mouseOn={mouseOn} setMouseOn={setMouseOn}
            animSpeed={animSpeed} setAnimSpeed={setAnimSpeed} animRef={animRef}
            aniSpacing={aniSpacing} setAniSpacing={setAniSpacing} aniAngle={aniAngle} setAniAngle={setAniAngle}
            aniWidth={aniWidth} setAniWidth={setAniWidth} aniLength={aniLength} setAniLength={setAniLength}/>}
          {tab==="export"&&<ExportTab onExport={doExport} exportImg={exportImg} onCloseExport={()=>setExportImg(null)} spec={spec}/>}
        </div>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>

</body>
