<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="theme-color" content="#080808"/>
<title>HeyMax Logo Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --n000:#FFFFFF;--n005:#F4F4F4;--n020:#F4F3F6;--n040:#E9E8EB;
  --n060:#C9C4D4;--n080:#514C56;--n090:#313131;--n100:#1A1A1A;
  --b040:#D8C1FF;--b060:#6E1FFF;--b080:#4000B8;--b100:#21005E;
  --panel:#FFFFFF;--surface:#F4F4F4;--border:#E9E8EB;--border2:#F4F3F6;
  --txt1:#1A1A1A;--txt2:#514C56;--txtm:#C9C4D4;
  --accent:#6E1FFF;--sans:'Plus Jakarta Sans',sans-serif;--ph:340px;
}
html,body{width:100%;height:100%;overflow:hidden;background:#080808;touch-action:none}
#app{width:100%;height:100%;display:flex;flex-direction:column}

/* Canvas */
.cw{flex:1;position:relative;overflow:hidden;min-height:0;touch-action:none}
.cw canvas{display:block;width:100%!important;height:100%!important}
.badge{position:absolute;bottom:12px;left:16px;font-family:var(--sans);font-size:10px;
  font-weight:500;color:rgba(255,255,255,0.25);pointer-events:none}
.adot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--b040);
  margin-right:5px;vertical-align:middle;animation:pulse 1.2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.2}}

/* Sheet */
.sheet{background:var(--panel);border-top:1px solid var(--border);
  flex-shrink:0;display:flex;flex-direction:column;height:var(--ph);
  transition:height 0.3s ease}
.sh-handle{width:100%;padding:10px 0 4px;display:flex;justify-content:center;cursor:pointer;flex-shrink:0}
.sh-pill{width:32px;height:3px;border-radius:2px;background:var(--n040)}
.tabs{display:flex;padding:0 16px;flex-shrink:0;border-bottom:1px solid var(--border)}
.tab{flex:1;padding:11px 4px;font-family:var(--sans);font-size:11px;font-weight:500;
  color:var(--txtm);background:none;border:none;cursor:pointer;
  border-bottom:2px solid transparent;transition:color .15s,border-color .15s}
.tab.on{color:var(--accent);border-bottom-color:var(--accent)}
.tc{flex:1;overflow-y:auto;padding:14px 16px 28px;-webkit-overflow-scrolling:touch}
.tc::-webkit-scrollbar{width:3px}
.tc::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

@media(min-width:768px){
  #app{flex-direction:row}
  .cw{flex:1}
  .sheet{width:288px;height:100%!important;border-top:none;border-left:1px solid var(--border)}
  .sh-handle{display:none}
  .tabs{padding:16px 16px 0;flex-direction:column;border-bottom:none;gap:2px}
  .tab{flex:none;text-align:left;padding:9px 12px;border-bottom:none;
    border-left:2px solid transparent;border-radius:0 6px 6px 0}
  .tab.on{background:rgba(110,31,255,.06);border-left-color:var(--accent)}
}

/* Controls */
.lbl{font-family:var(--sans);font-size:10px;font-weight:600;letter-spacing:.06em;
  color:var(--txtm);text-transform:uppercase;margin-bottom:8px;display:block}
.hr{border:none;border-top:1px solid var(--border2);margin:12px 0}
.sr{margin-bottom:14px}
.sh{display:flex;justify-content:space-between;margin-bottom:6px}
.sl{font-family:var(--sans);font-size:12px;font-weight:500;color:var(--txt2)}
.sv{font-family:var(--sans);font-size:11px;color:var(--txtm)}
input[type=range]{width:100%;height:3px;accent-color:var(--accent);cursor:pointer}
.tr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.tl{font-family:var(--sans);font-size:12px;font-weight:500;color:var(--txt2)}
.tt{width:40px;height:22px;border-radius:11px;cursor:pointer;position:relative;flex-shrink:0}
.th{position:absolute;top:3px;width:14px;height:14px;border-radius:50%;transition:left .2s}

/* Presets */
.pg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.pb{height:52px;border-radius:10px;border:2px solid transparent;cursor:pointer;position:relative;overflow:hidden}
.pb:active{transform:scale(.97)}
.pn{position:absolute;bottom:5px;left:8px;font-family:var(--sans);font-size:9px;
  font-weight:600;color:rgba(255,255,255,.85)}
.bgsw{display:flex;background:var(--surface);border-radius:8px;padding:3px;
  gap:2px;margin-bottom:12px;border:1px solid var(--border)}
.bgo{flex:1;padding:7px 0;font-family:var(--sans);font-size:11px;font-weight:500;
  border:none;cursor:pointer;border-radius:6px}

/* Colors */
.cs{margin-bottom:14px}
.cpr{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.cpt{font-family:var(--sans);font-size:11px;font-weight:600;color:var(--txt2)}
.cpb{flex:1;height:3px;border-radius:2px}
.er{display:flex;gap:8px;margin-bottom:6px}
.eb{flex:1}
.el{font-family:var(--sans);font-size:10px;font-weight:500;color:var(--txtm);margin-bottom:4px;display:block}
.cb{width:100%;height:36px;border-radius:8px;border:2px solid transparent;cursor:pointer;
  font-family:var(--sans);font-size:10px;font-weight:500}
.cb:active{transform:scale(.96)}

/* Modal */
.mov{position:fixed;inset:0;z-index:100;background:rgba(26,26,26,.75);
  backdrop-filter:blur(4px);display:flex;align-items:flex-end;justify-content:center;
  padding-bottom:env(safe-area-inset-bottom)}
@media(min-width:768px){.mov{align-items:center}}
.mbox{background:#fff;border-radius:16px 16px 0 0;border:1px solid var(--border);
  padding:20px 16px 32px;width:100%;max-width:480px;max-height:80vh;overflow-y:auto}
@media(min-width:768px){.mbox{border-radius:12px}}
.mtitle{font-family:var(--sans);font-size:13px;font-weight:600;color:var(--txt1);margin-bottom:14px}
.mgrp{font-family:var(--sans);font-size:10px;font-weight:600;letter-spacing:.05em;
  text-transform:uppercase;color:var(--txtm);margin:14px 0 7px}
.cgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:7px}
.csw{aspect-ratio:1;border-radius:8px;cursor:pointer;border:2px solid transparent}
.csw:active{transform:scale(.88)}
.csw.sel{border-color:var(--b060);box-shadow:0 0 0 2px var(--b040)}

/* Export */
.eb2{width:100%;padding:12px;border-radius:8px;border:1.5px solid var(--border);
  background:var(--surface);font-family:var(--sans);font-size:12px;font-weight:500;
  cursor:pointer;color:var(--txt2);margin-bottom:10px}
.eb2.pri{border-color:var(--accent);background:rgba(110,31,255,.06);color:var(--accent);font-weight:600}
.eov{position:fixed;inset:0;z-index:200;background:rgba(26,26,26,.93);
  backdrop-filter:blur(8px);display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:14px;padding:24px}
.eprev{max-width:100%;max-height:55vh;border-radius:12px;border:1px solid var(--border)}
.elinks{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.elnk{font-family:var(--sans);font-size:12px;font-weight:500;color:#fff;
  text-decoration:none;border:1.5px solid rgba(255,255,255,.2);border-radius:8px;
  padding:10px 22px;background:rgba(255,255,255,.08)}
.ecls{font-family:var(--sans);font-size:11px;color:rgba(255,255,255,.3);cursor:pointer}

/* Dual slider */
.dt{position:relative;height:24px;margin-bottom:4px}
.db{position:absolute;top:50%;transform:translateY(-50%);left:0;right:0;height:3px;background:var(--border);border-radius:2px}
.df{position:absolute;top:50%;transform:translateY(-50%);height:3px;background:var(--accent);border-radius:2px}
.dh{position:absolute;top:50%;transform:translate(-50%,-50%);width:16px;height:16px;border-radius:50%;cursor:ew-resize;touch-action:none}
.dh.lo{background:#fff;border:2px solid var(--n060);box-shadow:0 1px 4px rgba(0,0,0,.12)}
.dh.hi{background:var(--accent);border:2px solid var(--b080)}
</style>
</head>
<body>
<div id="app">
  <div class="cw" id="cw">
    <div id="mount" style="width:100%;height:100%"></div>
    <div class="badge" id="badge">HeyMax &middot; Logo Generator</div>
  </div>
  <div class="sheet" id="sheet">
    <div class="sh-handle" id="shh"><div class="sh-pill"></div></div>
    <div class="tabs" id="tabs"></div>
    <div class="tc" id="tc"></div>
  </div>
</div>
<div class="eov" id="eov" style="display:none">
  <img class="eprev" id="eprev" src="" alt=""/>
  <div class="elinks" id="elinks"></div>
  <div class="ecls" id="ecls">tap outside to close</div>
</div>
<div class="mov" id="mov" style="display:none">
  <div class="mbox" id="mbox"></div>
</div>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
var PALETTE=[
  {g:"Brand",  c:["#F3EAFF","#D8C1FF","#6E1FFF","#4000B8","#21005E"]},
  {g:"Teal",   c:["#D6FBFF","#C0FAFF","#00E3FD","#02818E","#015C65"]},
  {g:"Pink",   c:["#FDF0FA","#F498D9","#D812A6","#720E57","#4A0939"]},
  {g:"Yellow", c:["#FFF6BE","#FFEE8F","#FBE043","#F8CB00","#292200"]},
  {g:"Neutral",c:["#FFFFFF","#E9E8EB","#C9C4D4","#514C56","#1A1A1A"]},
];
var PRESETS=[
  {n:"Aurora", c:["#C0FAFF","#00E3FD","#00E3FD","#6E1FFF","#6E1FFF","#D8C1FF","#D8C1FF","#F498D9"],bg:"black"},
  {n:"Galaxy", c:["#21005E","#4000B8","#4000B8","#6E1FFF","#6E1FFF","#D8C1FF","#D8C1FF","#F3EAFF"],bg:"black"},
  {n:"Sunrise",c:["#FFF6BE","#FBE043","#FBE043","#F498D9","#F498D9","#D812A6","#D812A6","#4A0939"],bg:"white"},
  {n:"Ocean",  c:["#D6FBFF","#C0FAFF","#C0FAFF","#00E3FD","#00E3FD","#02818E","#02818E","#015C65"],bg:"black"},
  {n:"Mono",   c:["#FFFFFF","#C9C4D4","#C9C4D4","#514C56","#514C56","#1A1A1A","#1A1A1A","#1A1A1A"],bg:"black"},
  {n:"Violet", c:["#F3EAFF","#D8C1FF","#D8C1FF","#6E1FFF","#6E1FFF","#4000B8","#4000B8","#21005E"],bg:"black"},
];
var BGLIST=[
  {v:"black",c:"#080808",l:"Black"},
  {v:"grey", c:"#888888",l:"Grey"},
  {v:"white",c:"#f0f0f0",l:"White"},
];
var TABS=[{id:"colors",l:"Colors"},{id:"shape",l:"Shape"},{id:"anim",l:"Motion"},{id:"export",l:"Export"}];

// ── STATE ─────────────────────────────────────────────────────────────────────
var S={
  spacing:3.0,length:2.9,plateWidth:4.8,angle:38,radius:0.5,
  rotX:18,rotY:-33,rotZ:0,bg:"black",
  pc:["#21005E","#4000B8","#4000B8","#6E1FFF","#6E1FFF","#D8C1FF","#D8C1FF","#F3EAFF"],
  tab:"colors",shOpen:false,expData:null,
};
var AR={spacing:[1.5,4.5],angle:[5,80],width:[4.3,5.2],length:[2.7,3.25]};
var AN={on:false,mouse:false,speed:0.4,t:0,lastT:null};
var rotRef={x:18*Math.PI/180,y:-33*Math.PI/180};
var drag={on:false,x:0,y:0,pd:0};
var mouse={x:0,y:0};
var scene,camera,renderer,group,snap={};

// ── THREE.JS ──────────────────────────────────────────────────────────────────
function gradTex(a,b){
  var cv=document.createElement("canvas");cv.width=512;cv.height=4;
  var ctx=cv.getContext("2d"),g=ctx.createLinearGradient(0,0,512,0);
  g.addColorStop(0,a);g.addColorStop(1,b);ctx.fillStyle=g;ctx.fillRect(0,0,512,4);
  var t=new THREE.CanvasTexture(cv);t.wrapS=t.wrapT=THREE.ClampToEdgeWrapping;return t;
}
function remapUV(geo,ax,u0,u1){
  var p=geo.attributes.position,uv=new Float32Array(p.count*2),mn=1e9,mx=-1e9;
  for(var i=0;i<p.count;i++){var d=ax?p.getY(i):p.getX(i);if(d<mn)mn=d;if(d>mx)mx=d;}
  var dr=mx-mn||1;
  for(var i=0;i<p.count;i++){var d=ax?p.getY(i):p.getX(i);uv[i*2]=u0+((d-mn)/dr)*(u1-u0);uv[i*2+1]=0.5;}
  geo.setAttribute("uv",new THREE.BufferAttribute(uv,2));
}
function rr(w,h,r){
  var s=new THREE.Shape(),sr=Math.min(r,w/2-.01,h/2-.01);
  s.moveTo(-w/2+sr,-h/2);s.lineTo(w/2-sr,-h/2);s.quadraticCurveTo(w/2,-h/2,w/2,-h/2+sr);
  s.lineTo(w/2,h/2-sr);s.quadraticCurveTo(w/2,h/2,w/2-sr,h/2);
  s.lineTo(-w/2+sr,h/2);s.quadraticCurveTo(-w/2,h/2,-w/2,h/2-sr);
  s.lineTo(-w/2,-h/2+sr);s.quadraticCurveTo(-w/2,-h/2,-w/2+sr,-h/2);return s;
}
function tilted(w,h,r,cx,cy,cz,xA,yA,mat){
  var geo=new THREE.ShapeGeometry(rr(w,h,r),48);remapUV(geo,1,0,1);
  var mesh=new THREE.Mesh(geo,mat);
  var zA=new THREE.Vector3().crossVectors(xA,yA).normalize();
  var m4=new THREE.Matrix4();m4.makeBasis(xA.clone().normalize(),yA.clone().normalize(),zA);
  m4.setPosition(new THREE.Vector3(cx,cy,cz));mesh.matrix.copy(m4);mesh.matrixAutoUpdate=false;return mesh;
}
function buildShape(p){
  var dead=[];group.traverse(function(o){if(o.isMesh)dead.push(o);});
  dead.forEach(function(o){o.geometry.dispose();if(o.material&&o.material.map)o.material.map.dispose();if(o.material)o.material.dispose();group.remove(o);});
  var H=p.spacing/2,W=p.plateWidth/2,R=p.radius;
  var Ht=(Math.min(p.angle,90)/90)*p.plateWidth*0.98,sl=Math.sqrt(Ht*Ht+H*H);
  function pm(a,b){return new THREE.MeshBasicMaterial({map:gradTex(a,b),side:THREE.DoubleSide});}
  var c=p.pc;
  var g1=new THREE.ShapeGeometry(rr(p.plateWidth,p.length,R),48);remapUV(g1,0,0,1);
  var m1=new THREE.Mesh(g1,pm(c[0],c[1]));m1.rotation.x=-Math.PI/2;m1.position.y=H;group.add(m1);
  group.add(tilted(p.length,sl,R,W-Ht/2,H/2,0,new THREE.Vector3(0,0,1),new THREE.Vector3(-Ht,-H,0).normalize(),pm(c[2],c[3])));
  group.add(tilted(p.length,sl,R,W-Ht/2,-H/2,0,new THREE.Vector3(0,0,1),new THREE.Vector3(Ht,-H,0).normalize(),pm(c[4],c[5])));
  var g4=new THREE.ShapeGeometry(rr(p.plateWidth,p.length,R),48);remapUV(g4,0,0,1);
  var m4=new THREE.Mesh(g4,pm(c[6],c[7]));m4.rotation.x=-Math.PI/2;m4.position.y=-H;group.add(m4);
}
function getSnap(){return{spacing:S.spacing,length:S.length,plateWidth:S.plateWidth,angle:S.angle,radius:S.radius,pc:S.pc.slice()};}
function rebuild(){snap=getSnap();if(group&&!AN.on)buildShape(snap);}
function setBg(v){S.bg=v;var bg=BGLIST.find(function(o){return o.v===v;});if(scene&&bg)scene.background=new THREE.Color(bg.c);}

function lerp(a,b,t){return a+(b-a)*t;}
function wave(t,f,p){return(Math.sin(t*f+p)+1)/2;}
function hlp(a,b,f){
  var rA=parseInt(a.slice(1,3),16),gA=parseInt(a.slice(3,5),16),bA=parseInt(a.slice(5,7),16);
  var rB=parseInt(b.slice(1,3),16),gB=parseInt(b.slice(3,5),16),bB=parseInt(b.slice(5,7),16);
  return'#'+[Math.round(rA+f*(rB-rA)),Math.round(gA+f*(gB-gA)),Math.round(bA+f*(bB-bA))].map(function(v){return v.toString(16).padStart(2,'0');}).join('');
}

function initThree(){
  var el=document.getElementById("mount");
  scene=new THREE.Scene();scene.background=new THREE.Color(0x080808);
  camera=new THREE.PerspectiveCamera(36,el.clientWidth/el.clientHeight,0.1,100);
  camera.position.set(0,1,15);camera.lookAt(0,0,0);
  renderer=new THREE.WebGLRenderer({antialias:true,preserveDrawingBuffer:true});
  renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
  renderer.setSize(el.clientWidth,el.clientHeight);
  el.appendChild(renderer.domElement);
  group=new THREE.Group();group.rotation.x=rotRef.x;group.rotation.y=rotRef.y;scene.add(group);
  snap=getSnap();buildShape(snap);
  window.addEventListener("resize",function(){
    camera.aspect=el.clientWidth/el.clientHeight;camera.updateProjectionMatrix();
    renderer.setSize(el.clientWidth,el.clientHeight);
  });
  (function loop(ts){
    requestAnimationFrame(loop);
    if(AN.on){
      if(AN.lastT===null)AN.lastT=ts;
      var dt=(ts-AN.lastT)/1000;AN.lastT=ts;AN.t+=dt*AN.speed;
      var t=AN.t;
      var ns=lerp(AR.spacing[0],AR.spacing[1],wave(t,0.41,0));
      var na=lerp(AR.angle[0],AR.angle[1],wave(t,0.27,2.1));
      var nw=lerp(AR.width[0],AR.width[1],wave(t,0.33,4.5));
      var nl=lerp(AR.length[0],AR.length[1],wave(t,0.19,1.3));
      var mx=AN.mouse?mouse.x*0.4:0,my=AN.mouse?mouse.y*0.3:0;
      group.rotation.x=rotRef.x+Math.sin(t*0.11)*0.12+my;
      group.rotation.y=rotRef.y+Math.sin(t*0.08)*0.18+mx;
      var ac=snap.pc.map(function(col,i){var nx=snap.pc[(i+1)%snap.pc.length];return hlp(col,nx,wave(t,0.12+i*0.03,i*0.8)*0.55);});
      buildShape({spacing:ns,length:nl,plateWidth:nw,angle:na,radius:snap.radius,pc:ac});
    } else {
      AN.lastT=null;
      if(AN.mouse){group.rotation.x=rotRef.x+mouse.y*0.35;group.rotation.y=rotRef.y+mouse.x*0.5;}
      else if(!drag.on){group.rotation.x=rotRef.x;group.rotation.y=rotRef.y;}
    }
    renderer.render(scene,camera);
  })(0);
}

// ── INPUT ──────────────────────────────────────────────────────────────────────
var cw=document.getElementById("cw");
function getXY(e){return e.touches?{x:e.touches[0].clientX,y:e.touches[0].clientY}:{x:e.clientX,y:e.clientY};}
cw.addEventListener("pointerdown",function(e){var p=getXY(e);drag={on:true,x:p.x,y:p.y,pd:0};});
cw.addEventListener("pointermove",function(e){
  if(AN.mouse){var r=cw.getBoundingClientRect();mouse.x=((e.clientX-r.left)/r.width-0.5)*2;mouse.y=((e.clientY-r.top)/r.height-0.5)*2;}
  if(!drag.on)return;var p=getXY(e);
  rotRef.y+=(p.x-drag.x)*0.007;rotRef.x+=(p.y-drag.y)*0.007;drag.x=p.x;drag.y=p.y;
});
cw.addEventListener("pointerup",function(){drag.on=false;});
cw.addEventListener("wheel",function(e){e.preventDefault();if(camera)camera.position.z=Math.max(3,Math.min(40,camera.position.z+e.deltaY*0.02));},{passive:false});
cw.addEventListener("touchstart",function(e){
  if(e.touches.length===2){drag.pd=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);return;}
  drag={on:true,x:e.touches[0].clientX,y:e.touches[0].clientY,pd:0};
},{passive:true});
cw.addEventListener("touchmove",function(e){
  if(e.touches.length===2){var d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);if(drag.pd>0&&camera)camera.position.z=Math.max(3,Math.min(40,camera.position.z+(drag.pd-d)*0.05));drag.pd=d;return;}
  if(!drag.on)return;rotRef.y+=(e.touches[0].clientX-drag.x)*0.007;rotRef.x+=(e.touches[0].clientY-drag.y)*0.007;drag.x=e.touches[0].clientX;drag.y=e.touches[0].clientY;
},{passive:true});
cw.addEventListener("touchend",function(){drag.on=false;},{passive:true});

// ── UI HELPERS ────────────────────────────────────────────────────────────────
function el(tag,cls,txt){var e=document.createElement(tag);if(cls)e.className=cls;if(txt)e.textContent=txt;return e;}
function lbl(t){return el("span","lbl",t);}
function hr(){return el("hr","hr");}
function isLt(h){var r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return 0.299*r+0.587*g+0.114*b>140;}

function mkSlider(label,val,min,max,step,unit,cb){
  var d=el("div","sr"),fmt=function(v){return unit==="°"?Math.round(v)+"°":parseFloat(v).toFixed(2);};
  var h=el("div","sh"),l=el("span","sl",label),v=el("span","sv",fmt(val));
  h.appendChild(l);h.appendChild(v);d.appendChild(h);
  var inp=document.createElement("input");inp.type="range";inp.min=min;inp.max=max;inp.step=step;inp.value=val;
  inp.oninput=function(){v.textContent=fmt(parseFloat(inp.value));cb(parseFloat(inp.value));};
  d.appendChild(inp);return d;
}
function mkToggle(label,val,cb,accent){
  accent=accent||"#6E1FFF";
  var d=el("div","tr"),l=el("span","tl",label);
  var tt=el("div","tt");tt.style.background=val?accent:"#E9E8EB";
  var th=el("div","th");th.style.left=val?"21px":"3px";th.style.background=val?"#fff":"#C9C4D4";
  tt.appendChild(th);
  tt.onclick=function(){val=!val;tt.style.background=val?accent:"#E9E8EB";th.style.left=val?"21px":"3px";th.style.background=val?"#fff":"#C9C4D4";cb(val);};
  d.appendChild(l);d.appendChild(tt);return d;
}
function mkDual(label,mn,mx,step,lo,hi,unit,clo,chi){
  var d=el("div","sr"),fmt=function(v){return unit==="°"?Math.round(v)+"°":parseFloat(v).toFixed(2);};
  var h=el("div","sh"),l=el("span","sl",label),v=el("span","sv",fmt(lo)+" – "+fmt(hi));
  h.appendChild(l);h.appendChild(v);d.appendChild(h);
  var tr=el("div","dt"),db2=el("div","db"),df=el("div","df"),lh=el("div","dh lo"),hh=el("div","dh hi");
  tr.appendChild(db2);tr.appendChild(df);tr.appendChild(lh);tr.appendChild(hh);
  function pct(x){return((x-mn)/(mx-mn))*100;}
  function upd(){lh.style.left=pct(lo)+"%";hh.style.left=pct(hi)+"%";df.style.left=pct(lo)+"%";df.style.width=(pct(hi)-pct(lo))+"%";v.textContent=fmt(lo)+" – "+fmt(hi);}
  upd();
  function snp(x){return Math.round(x/step)*step;}
  function pos2v(cx){var r=tr.getBoundingClientRect(),t=Math.max(0,Math.min(1,(cx-r.left)/r.width));return snp(mn+t*(mx-mn));}
  var dragging=null;
  function mv(e){if(!dragging)return;var cx=e.touches?e.touches[0].clientX:e.clientX,val=pos2v(cx);if(dragging==="lo"){lo=Math.min(val,hi-step);clo(lo);}else{hi=Math.max(val,lo+step);chi(hi);}upd();}
  function up(){dragging=null;window.removeEventListener("pointermove",mv);window.removeEventListener("pointerup",up);}
  lh.onpointerdown=function(e){e.preventDefault();dragging="lo";window.addEventListener("pointermove",mv);window.addEventListener("pointerup",up);};
  hh.onpointerdown=function(e){e.preventDefault();dragging="hi";window.addEventListener("pointermove",mv);window.addEventListener("pointerup",up);};
  d.appendChild(tr);return d;
}

// ── COLOR MODAL ───────────────────────────────────────────────────────────────
var modalCb=null;
document.getElementById("mov").onclick=function(e){if(e.target===this)this.style.display="none";};
function openModal(title,cur,cb){
  modalCb=cb;var box=document.getElementById("mbox");box.innerHTML="";
  var t=el("div","mtitle",title);box.appendChild(t);
  PALETTE.forEach(function(grp){
    box.appendChild(el("div","mgrp",grp.g));
    var grid=el("div","cgrid");
    grp.c.forEach(function(c){
      var sw=el("div","csw"+(c===cur?" sel":""));sw.style.background=c;
      sw.onclick=function(){document.getElementById("mov").style.display="none";if(modalCb)modalCb(c);};
      grid.appendChild(sw);
    });
    box.appendChild(grid);
  });
  var cancel=el("div","","Cancel");cancel.style.cssText="text-align:center;margin-top:14px;font-family:var(--sans);font-size:11px;color:var(--txtm);cursor:pointer";
  cancel.onclick=function(){document.getElementById("mov").style.display="none";};
  box.appendChild(cancel);
  document.getElementById("mov").style.display="flex";
}

// ── TABS & SHEET ──────────────────────────────────────────────────────────────
var sheetEl=document.getElementById("sheet");
document.getElementById("shh").onclick=function(){
  S.shOpen=!S.shOpen;sheetEl.style.height=S.shOpen?(window.innerHeight*.62)+"px":"var(--ph)";
};
function renderTabs(){
  var te=document.getElementById("tabs");te.innerHTML="";
  TABS.forEach(function(t){
    var b=el("button","tab"+(S.tab===t.id?" on":""),t.l);
    b.onclick=function(){S.tab=t.id;if(window.innerWidth<768){S.shOpen=true;sheetEl.style.height=(window.innerHeight*.62)+"px";}renderAll();};
    te.appendChild(b);
  });
}
function renderContent(){
  var tc=document.getElementById("tc");tc.innerHTML="";
  if(S.tab==="colors") renderColors(tc);
  else if(S.tab==="shape") renderShape(tc);
  else if(S.tab==="anim") renderAnim(tc);
  else if(S.tab==="export") renderExport(tc);
}
function renderAll(){renderTabs();renderContent();}

// ── COLORS ────────────────────────────────────────────────────────────────────
function renderColors(tc){
  tc.appendChild(lbl("Presets"));
  var pg=el("div","pg");
  PRESETS.forEach(function(p){
    var btn=el("div","pb");
    btn.style.background="linear-gradient(135deg,"+p.c[0]+","+p.c[3]+","+p.c[6]+")";
    btn.appendChild(el("span","pn",p.n));
    btn.onclick=function(){S.pc=p.c.slice();setBg(p.bg);rebuild();renderAll();};
    pg.appendChild(btn);
  });
  tc.appendChild(pg);tc.appendChild(hr());

  tc.appendChild(lbl("Background"));
  var sw=el("div","bgsw");
  BGLIST.forEach(function(o){
    var b=el("button","bgo",o.l);
    b.style.background=S.bg===o.v?o.c:"transparent";
    b.style.color=S.bg===o.v?(o.v==="white"?"#111":o.v==="grey"?"#fff":"#888"):"#666";
    b.onclick=function(){setBg(o.v);rebuild();renderAll();};
    sw.appendChild(b);
  });
  tc.appendChild(sw);tc.appendChild(hr());

  tc.appendChild(lbl("Panel Colours"));
  var panels=[
    {id:"R1",ea:"ab",eb:"dc",ia:0,ib:1},
    {id:"R2",ea:"dc",eb:"ef",ia:2,ib:3},
    {id:"R3",ea:"ef",eb:"gh",ia:4,ib:5},
    {id:"R4",ea:"gh",eb:"ji",ia:6,ib:7},
  ];
  panels.forEach(function(p){
    var sec=el("div","cs");
    var pr=el("div","cpr");pr.appendChild(el("span","cpt",p.id));
    var bar=el("div","cpb");bar.style.background="linear-gradient(90deg,"+S.pc[p.ia]+","+S.pc[p.ib]+")";
    pr.appendChild(bar);sec.appendChild(pr);
    var er2=el("div","er");
    [0,1].forEach(function(j){
      var idx=j===0?p.ia:p.ib,edge=j===0?p.ea:p.eb;
      var blk=el("div","eb");blk.appendChild(el("span","el","["+edge+"]"));
      var btn=el("div","cb");btn.style.background=S.pc[idx];btn.style.color=isLt(S.pc[idx])?"#111":"#fff";btn.textContent=S.pc[idx].toUpperCase();
      btn.onclick=(function(i){return function(){openModal(p.id+" · ["+edge+"]",S.pc[i],function(c){S.pc[i]=c;rebuild();renderAll();});};})(idx);
      blk.appendChild(btn);er2.appendChild(blk);
    });
    sec.appendChild(er2);tc.appendChild(sec);
  });
  var rev=el("button","","↔ Reverse");rev.style.cssText="width:100%;padding:8px;border-radius:6px;border:1px solid var(--border);background:none;font-family:var(--sans);font-size:11px;color:var(--txtm);cursor:pointer;margin-top:4px";
  rev.onclick=function(){S.pc=S.pc.slice().reverse();rebuild();renderAll();};
  tc.appendChild(rev);
}

// ── SHAPE ─────────────────────────────────────────────────────────────────────
function renderShape(tc){
  tc.appendChild(lbl("Panels"));
  [{l:"Spacing",k:"spacing",mn:0.4,mx:6,st:0.05},
   {l:"Length",k:"length",mn:2.70,mx:3.25,st:0.05},
   {l:"Plate Width",k:"plateWidth",mn:4.30,mx:5.20,st:0.05},
   {l:"Angle",k:"angle",mn:0,mx:90,st:1,u:"°"},
   {l:"Radius",k:"radius",mn:0.3,mx:0.9,st:0.01}
  ].forEach(function(f){
    tc.appendChild(mkSlider(f.l,S[f.k],f.mn,f.mx,f.st,f.u||"",function(v){S[f.k]=v;rebuild();}));
  });
  tc.appendChild(hr());tc.appendChild(lbl("Rotation"));
  [{l:"X",k:"rotX"},{l:"Y",k:"rotY"},{l:"Z",k:"rotZ"}].forEach(function(f){
    tc.appendChild(mkSlider(f.l,S[f.k],-180,180,1,"°",function(v){
      S[f.k]=v;rotRef.x=S.rotX*Math.PI/180;rotRef.y=S.rotY*Math.PI/180;
      if(group&&!AN.on){group.rotation.x=rotRef.x;group.rotation.y=rotRef.y;group.rotation.z=S.rotZ*Math.PI/180;}
    }));
  });
}

// ── ANIM ──────────────────────────────────────────────────────────────────────
function renderAnim(tc){
  tc.appendChild(mkToggle("Animate",AN.on,function(v){
    AN.on=v;if(!v)AN.lastT=null;
    document.getElementById("badge").innerHTML=v?"<span class='adot'></span>HeyMax &middot; Logo Generator":"HeyMax &middot; Logo Generator";
    renderAll();
  },"#6E1FFF"));
  tc.appendChild(mkToggle("Mouse / Touch Parallax",AN.mouse,function(v){AN.mouse=v;},"#02818E"));

    tc.appendChild(mkDual("Angle",0,90,1,AR.angle[0],AR.angle[1],"°",function(v){AR.angle[0]=v;},function(v){AR.angle[1]=v;}));
    tc.appendChild(mkDual("Plate Width",4.3,5.2,0.05,AR.width[0],AR.width[1],"",function(v){AR.width[0]=v;},function(v){AR.width[1]=v;}));
    tc.appendChild(mkDual("Length",2.70,3.25,0.05,AR.length[0],AR.length[1],"",function(v){AR.length[0]=v;},function(v){AR.length[1]=v;}));
  }
}

// ── EXPORT ────────────────────────────────────────────────────────────────────
function renderExport(tc){
  tc.appendChild(lbl("Export"));
  var btn=el("button","eb2 pri","↓ Capture");
  btn.onclick=doExport;tc.appendChild(btn);
  if(S.expData){
    var spec=S.expData.spec;
    tc.appendChild(hr());tc.appendChild(lbl("Parameters"));
    [["Spacing",spec.shape.spacing],["Length",spec.shape.length],["Width",spec.shape.plateWidth],["Angle",spec.shape.angle+"°"],["Radius",spec.shape.radius],["Rot X",spec.rotation.x+"°"],["Rot Y",spec.rotation.y+"°"],["Background",spec.background]].forEach(function(r){
      var row=el("div","");row.style.cssText="display:flex;justify-content:space-between;margin-bottom:8px";
      var k=el("span","");k.style.cssText="font-family:var(--sans);font-size:12px;font-weight:500;color:var(--txt2)";k.textContent=r[0];
      var v2=el("span","");v2.style.cssText="font-family:var(--sans);font-size:12px;color:var(--txtm)";v2.textContent=r[1];
      row.appendChild(k);row.appendChild(v2);tc.appendChild(row);
    });
  }
}
function doExport(){
  if(!renderer)return;
  renderer.render(scene,camera);
  var cv=renderer.domElement,png=cv.toDataURL("image/png");
  function toBlob(d){var p=d.split(","),m=p[0].match(/:(.*?);/)[1],b=atob(p[1]),a=new Uint8Array(b.length);for(var i=0;i<b.length;i++)a[i]=b.charCodeAt(i);return new Blob([a],{type:m});}
  var pngUrl=URL.createObjectURL(toBlob(png));
  var spec={generated:new Date().toISOString(),shape:{spacing:S.spacing,length:S.length,plateWidth:S.plateWidth,angle:S.angle,radius:S.radius},rotation:{x:Math.round(S.rotX),y:Math.round(S.rotY),z:Math.round(S.rotZ)},gradient:{R1:{ab:S.pc[0],dc:S.pc[1]},R2:{dc:S.pc[2],ef:S.pc[3]},R3:{ef:S.pc[4],gh:S.pc[5]},R4:{gh:S.pc[6],ji:S.pc[7]}},background:S.bg};
  var jsonUrl=URL.createObjectURL(new Blob([JSON.stringify(spec,null,2)],{type:"application/json"}));
  S.expData={spec:spec};
  document.getElementById("eprev").src=png;
  var el2=document.getElementById("elinks");el2.innerHTML="";
  [{l:"↓ PNG",u:pngUrl,d:"heymax.png"},{l:"↓ JSON",u:jsonUrl,d:"heymax-spec.json"}].forEach(function(x){
    var a=el("a","elnk",x.l);a.href=x.u;a.download=x.d;el2.appendChild(a);
  });
  document.getElementById("eov").style.display="flex";
  renderAll();
}
document.getElementById("eov").onclick=function(e){if(e.target===this)this.style.display="none";};
document.getElementById("ecls").onclick=function(){document.getElementById("eov").style.display="none";};

// ── BOOT ──────────────────────────────────────────────────────────────────────
renderAll();
initThree();
