<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="theme-color" content="#080808"/>
<title>HeyMax Logo Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --neutral-000:#FFFFFF;--neutral-005:#F4F4F4;--neutral-020:#F4F3F6;
  --neutral-040:#E9E8EB;--neutral-060:#C9C4D4;--neutral-080:#514C56;
  --neutral-090:#313131;--neutral-100:#1A1A1A;
  --brand-040:#D8C1FF;--brand-060:#6E1FFF;--brand-080:#4000B8;--brand-100:#21005E;
  --panel:var(--neutral-000);--panel-surface:var(--neutral-005);
  --border:var(--neutral-040);--border-subtle:var(--neutral-020);
  --text-primary:var(--neutral-100);--text-secondary:var(--neutral-080);--text-muted:var(--neutral-060);
  --accent:var(--brand-060);--sans:'Plus Jakarta Sans',sans-serif;--panel-h:340px;
}
html,body{width:100%;height:100%;overflow:hidden;background:#080808;touch-action:none}
#app{width:100%;height:100%;display:flex;flex-direction:column}
.canvas-wrap{flex:1;position:relative;overflow:hidden;min-height:0;touch-action:none}
.canvas-wrap canvas{display:block;width:100%!important;height:100%!important}
.sheet{background:var(--panel);border-top:1px solid var(--border);flex-shrink:0;display:flex;flex-direction:column;height:var(--panel-h);transition:height 0.3s ease}
.sheet-handle{width:100%;padding:10px 0 4px;display:flex;justify-content:center;cursor:pointer;flex-shrink:0}
.sheet-pill{width:32px;height:3px;border-radius:2px;background:var(--neutral-040)}
.tabs{display:flex;padding:0 16px;flex-shrink:0;border-bottom:1px solid var(--border)}
.tab{flex:1;padding:11px 4px;font-family:var(--sans);font-size:11px;font-weight:500;color:var(--text-muted);background:none;border:none;cursor:pointer;border-bottom:2px solid transparent}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab-content{flex:1;overflow-y:auto;padding:14px 16px 24px;-webkit-overflow-scrolling:touch}
@media(min-width:768px){
  #app{flex-direction:row}
  .canvas-wrap{flex:1}
  .sheet{width:288px;height:100%!important;border-top:none;border-left:1px solid var(--border)}
  .sheet-handle{display:none}
  .tabs{padding:16px 16px 0;flex-direction:column;border-bottom:none;gap:2px}
  .tab{flex:none;text-align:left;padding:9px 12px;border-bottom:none;border-left:2px solid transparent;border-radius:0 6px 6px 0}
  .tab.active{background:rgba(110,31,255,0.06);border-left-color:var(--accent)}
}
.lbl{font-family:var(--sans);font-size:10px;font-weight:600;letter-spacing:0.06em;color:var(--text-muted);text-transform:uppercase;margin-bottom:8px;display:block}
.hr{border:none;border-top:1px solid var(--border-subtle);margin:12px 0}
.sl-row{margin-bottom:14px}
.sl-hdr{display:flex;justify-content:space-between;margin-bottom:6px}
.sl-lbl{font-family:var(--sans);font-size:12px;font-weight:500;color:var(--text-secondary)}
.sl-val{font-family:var(--sans);font-size:11px;color:var(--text-muted)}
input[type=range]{width:100%;height:3px;accent-color:var(--accent);cursor:pointer}
.tgl-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.tgl-lbl{font-family:var(--sans);font-size:12px;font-weight:500;color:var(--text-secondary)}
.tgl-track{width:40px;height:22px;border-radius:11px;cursor:pointer;position:relative;flex-shrink:0}
.tgl-thumb{position:absolute;top:3px;width:14px;height:14px;border-radius:50%;transition:left 0.2s}
.preset-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.preset-btn{height:52px;border-radius:10px;border:2px solid transparent;cursor:pointer;position:relative;overflow:hidden}
.preset-btn:active{transform:scale(0.97)}
.preset-name{position:absolute;bottom:5px;left:8px;font-family:var(--sans);font-size:9px;font-weight:600;color:rgba(255,255,255,0.85)}
.bg-sw{display:flex;background:var(--panel-surface);border-radius:8px;padding:3px;gap:2px;margin-bottom:12px;border:1px solid var(--border)}
.bg-opt{flex:1;padding:7px 0;font-family:var(--sans);font-size:11px;font-weight:500;border:none;cursor:pointer;border-radius:6px}
.clr-sec{margin-bottom:14px}
.clr-pl-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.clr-pl-tag{font-family:var(--sans);font-size:11px;font-weight:600;color:var(--text-secondary)}
.clr-pl-bar{flex:1;height:3px;border-radius:2px}
.edge-row{display:flex;gap:8px;margin-bottom:6px}
.edge-blk{flex:1}
.edge-lbl{font-family:var(--sans);font-size:10px;font-weight:500;color:var(--text-muted);margin-bottom:4px;display:block}
.clr-btn{width:100%;height:36px;border-radius:8px;border:2px solid transparent;cursor:pointer;font-family:var(--sans);font-size:10px;font-weight:500}
.clr-btn:active{transform:scale(0.96)}
.modal-ov{position:fixed;inset:0;z-index:100;background:rgba(26,26,26,0.75);backdrop-filter:blur(4px);display:flex;align-items:flex-end;justify-content:center;padding-bottom:env(safe-area-inset-bottom)}
@media(min-width:768px){.modal-ov{align-items:center}}
.modal-box{background:#fff;border-radius:16px 16px 0 0;border:1px solid var(--border);padding:20px 16px 32px;width:100%;max-width:480px;max-height:80vh;overflow-y:auto}
@media(min-width:768px){.modal-box{border-radius:12px}}
.modal-title{font-family:var(--sans);font-size:13px;font-weight:600;color:var(--text-primary);margin-bottom:14px}
.modal-grp{font-family:var(--sans);font-size:10px;font-weight:600;letter-spacing:0.05em;text-transform:uppercase;color:var(--text-muted);margin:14px 0 7px}
.clr-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:7px}
.clr-sw{aspect-ratio:1;border-radius:8px;cursor:pointer;border:2px solid transparent}
.clr-sw:active{transform:scale(0.88)}
.clr-sw.sel{border-color:var(--brand-060);box-shadow:0 0 0 2px var(--brand-040)}
.font-clr-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px}
.font-chip{width:28px;height:28px;border-radius:6px;cursor:pointer;border:2px solid transparent;flex-shrink:0}
.font-chip:active{transform:scale(0.9)}
.font-chip.sel{border-color:var(--accent);box-shadow:0 0 0 2px var(--brand-040)}
.exp-btn{width:100%;padding:12px;border-radius:8px;border:1.5px solid var(--border);background:var(--panel-surface);font-family:var(--sans);font-size:12px;font-weight:500;cursor:pointer;color:var(--text-secondary);margin-bottom:10px}
.exp-btn.primary{border-color:var(--accent);background:rgba(110,31,255,0.06);color:var(--accent);font-weight:600}
.exp-ov{position:fixed;inset:0;z-index:200;background:rgba(26,26,26,0.93);backdrop-filter:blur(8px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:24px}
.exp-img{max-width:100%;max-height:55vh;border-radius:12px;border:1px solid var(--border)}
.exp-links{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.exp-lnk{font-family:var(--sans);font-size:12px;font-weight:500;color:#fff;text-decoration:none;border:1.5px solid rgba(255,255,255,0.2);border-radius:8px;padding:10px 22px;background:rgba(255,255,255,0.08)}
.exp-close{font-family:var(--sans);font-size:11px;color:rgba(255,255,255,0.3);cursor:pointer}
.logo-bar{position:absolute;top:0;left:0;right:0;height:80px;display:flex;align-items:center;padding:0 16px;pointer-events:none;z-index:10}
.logo-inner{display:flex;align-items:center;height:52px;pointer-events:auto;gap:0}
.logo-canvas{display:block;width:52px;height:52px;border-radius:6px;flex-shrink:0}
.logo-dl{position:absolute;top:14px;right:16px;font-family:var(--sans);font-size:11px;font-weight:500;color:rgba(255,255,255,0.8);background:rgba(0,0,0,0.35);backdrop-filter:blur(6px);border:1px solid rgba(255,255,255,0.18);border-radius:6px;padding:6px 14px;cursor:pointer;pointer-events:auto}
.logo-dl.light{color:rgba(0,0,0,0.7);background:rgba(255,255,255,0.65);border-color:rgba(0,0,0,0.1)}
.dual-track{position:relative;height:24px;margin-bottom:4px}
.dual-base{position:absolute;top:50%;transform:translateY(-50%);left:0;right:0;height:3px;background:var(--border);border-radius:2px}
.dual-fill{position:absolute;top:50%;transform:translateY(-50%);height:3px;background:var(--accent);border-radius:2px}
.dual-h{position:absolute;top:50%;transform:translate(-50%,-50%);width:16px;height:16px;border-radius:50%;cursor:ew-resize;touch-action:none}
.dual-h.lo{background:#fff;border:2px solid var(--neutral-060);box-shadow:0 1px 4px rgba(0,0,0,0.12)}
.dual-h.hi{background:var(--accent);border:2px solid var(--brand-080)}
.anim-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--brand-040);margin-right:6px;vertical-align:middle;animation:pulse 1.2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.2}}
.canvas-badge{position:absolute;bottom:12px;left:16px;font-family:var(--sans);font-size:10px;font-weight:500;color:rgba(255,255,255,0.25);pointer-events:none}
</style>
</head>

function makeGradTex(a,b){
  var cv=document.createElement("canvas");cv.width=512;cv.height=4;
  var ctx=cv.getContext("2d");
  var g=ctx.createLinearGradient(0,0,512,0);
  g.addColorStop(0,a);g.addColorStop(1,b);
  ctx.fillStyle=g;ctx.fillRect(0,0,512,4);
  var t=new THREE.CanvasTexture(cv);
  t.wrapS=t.wrapT=THREE.ClampToEdgeWrapping;
  return t;
}
function remapUVs(geo,axis,u0,u1){
  var pos=geo.attributes.position,uvs=new Float32Array(pos.count*2);
  var mn=Infinity,mx=-Infinity;
  for(var i=0;i<pos.count;i++){var d=axis===0?pos.getX(i):pos.getY(i);if(d<mn)mn=d;if(d>mx)mx=d;}
  var dR=mx-mn||1;
  for(var i=0;i<pos.count;i++){var d=axis===0?pos.getX(i):pos.getY(i);uvs[i*2]=u0+((d-mn)/dR)*(u1-u0);uvs[i*2+1]=0.5;}
  geo.setAttribute("uv",new THREE.BufferAttribute(uvs,2));
}
function rrShape(w,h,r){
  var s=new THREE.Shape();
  var sr=Math.min(r,w/2-0.01,h/2-0.01);
  s.moveTo(-w/2+sr,-h/2);s.lineTo(w/2-sr,-h/2);
  s.quadraticCurveTo(w/2,-h/2,w/2,-h/2+sr);s.lineTo(w/2,h/2-sr);
  s.quadraticCurveTo(w/2,h/2,w/2-sr,h/2);s.lineTo(-w/2+sr,h/2);
  s.quadraticCurveTo(-w/2,h/2,-w/2,h/2-sr);s.lineTo(-w/2,-h/2+sr);
  s.quadraticCurveTo(-w/2,-h/2,-w/2+sr,-h/2);
  return s;
}
function tilted(w,h,r,cx,cy,cz,xA,yA,mat,ua,u0,u1){
  var geo=new THREE.ShapeGeometry(rrShape(w,h,r),48);
  remapUVs(geo,ua,u0,u1);
  var mesh=new THREE.Mesh(geo,mat);
  var zA=new THREE.Vector3().crossVectors(xA,yA).normalize();
  var m4=new THREE.Matrix4();
  m4.makeBasis(xA.clone().normalize(),yA.clone().normalize(),zA);
  m4.setPosition(new THREE.Vector3(cx,cy,cz));
  mesh.matrix.copy(m4);mesh.matrixAutoUpdate=false;
  return mesh;
}
function buildShape(p){
  var dead=[];
  group.traverse(function(o){if(o.isMesh)dead.push(o);});
  dead.forEach(function(o){
    o.geometry.dispose();
    if(o.material&&o.material.map)o.material.map.dispose();
    if(o.material)o.material.dispose();
    group.remove(o);
  });
  var H=p.spacing/2,W=p.plateWidth/2,R=p.radius;
  var Ht=(Math.min(p.angle,90)/90)*p.plateWidth*0.98;

function makeDual(label,absMin,absMax,step,lo,hi,unit,onLo,onHi){
  var d=document.createElement("div");d.className="sl-row";
  var fmtV=function(v){return unit==="°"?Math.round(v)+"°":parseFloat(v).toFixed(2);};
  var valSpan=document.createElement("span");valSpan.className="sl-val";
  valSpan.textContent=fmtV(lo)+" – "+fmtV(hi);
  var hdr=document.createElement("div");hdr.className="sl-hdr";
  var lbl=document.createElement("span");lbl.className="sl-lbl";lbl.textContent=label;
  hdr.appendChild(lbl);hdr.appendChild(valSpan);d.appendChild(hdr);
  var track=document.createElement("div");track.className="dual-track";
  var base=document.createElement("div");base.className="dual-base";track.appendChild(base);
  var fill=document.createElement("div");fill.className="dual-fill";track.appendChild(fill);
  var loH=document.createElement("div");loH.className="dual-h lo";
  var hiH=document.createElement("div");hiH.className="dual-h hi";
  track.appendChild(loH);track.appendChild(hiH);
  var dragging=null;
  function pct(v){return ((v-absMin)/(absMax-absMin))*100;}
  function update(){
    loH.style.left=pct(lo)+"%";hiH.style.left=pct(hi)+"%";
    fill.style.left=pct(lo)+"%";fill.style.width=(pct(hi)-pct(lo))+"%";
    valSpan.textContent=fmtV(lo)+" – "+fmtV(hi);
  }
  update();
  function snap(v){return Math.round(v/step)*step;}
  function posToVal(cx){
    var r=track.getBoundingClientRect();
    var t=Math.max(0,Math.min(1,(cx-r.left)/r.width));
    return snap(absMin+t*(absMax-absMin));
  }
  function onMove(e){
    if(!dragging)return;
    var cx=e.touches?e.touches[0].clientX:e.clientX;
    var v=posToVal(cx);
    if(dragging==="lo"){lo=Math.min(v,hi-step);onLo(lo);}
    else{hi=Math.max(v,lo+step);onHi(hi);}
    update();
  }
  function onUp(){dragging=null;window.removeEventListener("pointermove",onMove);window.removeEventListener("pointerup",onUp);}
  loH.onpointerdown=function(e){e.preventDefault();dragging="lo";window.addEventListener("pointermove",onMove);window.addEventListener("pointerup",onUp);};
  hiH.onpointerdown=function(e){e.preventDefault();dragging="hi";window.addEventListener("pointermove",onMove);window.addEventListener("pointerup",onUp);};
  d.appendChild(track);return d;
}

    btn.onclick=function(){setBg(o.value);renderTab();};
    sw.appendChild(btn);
  });
  c.appendChild(sw);c.appendChild(hr());
  // Font color
  c.appendChild(lbl("Font Colour"));
  var fcr=document.createElement("div");fcr.className="font-clr-row";
  FONT_COLORS.forEach(function(hex){
    var chip=document.createElement("div");chip.className="font-chip"+(state.fontColor===hex?" sel":"");
    chip.style.background=hex;
    if(hex==="#FFFFFF")chip.style.border="2px solid "+(state.fontColor===hex?"#6E1FFF":"#E9E8EB");
    chip.title=hex;
    chip.onclick=function(){state.fontColor=hex;updateLogoParts();renderTab();};
    fcr.appendChild(chip);
  });
  c.appendChild(fcr);c.appendChild(hr());
  // Panel colors
  c.appendChild(lbl("Panel Colours"));
  var panels=[
    {id:"R1",ea:"ab",eb:"dc",ia:0,ib:1},
    {id:"R2",ea:"dc",eb:"ef",ia:2,ib:3},
    {id:"R3",ea:"ef",eb:"gh",ia:4,ib:5},
    {id:"R4",ea:"gh",eb:"ji",ia:6,ib:7},
  ];
  panels.forEach(function(p){
    var sec=document.createElement("div");sec.className="clr-sec";
    var plRow=document.createElement("div");plRow.className="clr-pl-row";
    var tag=document.createElement("span");tag.className="clr-pl-tag";tag.textContent=p.id;
    var bar=document.createElement("div");bar.className="clr-pl-bar";
    bar.style.background="linear-gradient(90deg,"+state.panelColors[p.ia]+","+state.panelColors[p.ib]+")";
    plRow.appendChild(tag);plRow.appendChild(bar);sec.appendChild(plRow);
    var er=document.createElement("div");er.className="edge-row";
    [0,1].forEach(function(j){
      var idx=j===0?p.ia:p.ib;var edge=j===0?p.ea:p.eb;
      var blk=document.createElement("div");blk.className="edge-blk";
      var lblEl=document.createElement("span");lblEl.className="edge-lbl";lblEl.textContent="["+edge+"]";
      var btn=document.createElement("div");btn.className="clr-btn";
      btn.style.background=state.panelColors[idx];
      btn.style.color=isLight(state.panelColors[idx])?"#111":"#fff";
      btn.textContent=state.panelColors[idx].toUpperCase();
      btn.onclick=(function(i){return function(){
        openModal(p.id+" · ["+edge+"]",state.panelColors[i],function(col){
          state.panelColors[i]=col;rebuild();renderTab();
        });
      };})(idx);
      blk.appendChild(lblEl);blk.appendChild(btn);er.appendChild(blk);
    });
    sec.appendChild(er);c.appendChild(sec);
  });
  var revBtn=document.createElement("button");
  revBtn.style.cssText="width:100%;padding:8px;border-radius:6px;border:1px solid var(--border);background:none;font-family:var(--sans);font-size:11px;color:var(--text-muted);cursor:pointer;margin-top:4px";
  revBtn.textContent="↔ Reverse";
  revBtn.onclick=function(){state.panelColors=state.panelColors.slice().reverse();rebuild();renderTab();};
  c.appendChild(revBtn);
}

// ═══════════ SHAPE TAB ═══════════
function renderShapeTab(){
  var c=tabContent;
  c.appendChild(lbl("Panels"));
  var fields=[
    {lbl:"Spacing",key:"spacing",min:0.4,max:6,step:0.05},
    {lbl:"Length",key:"length",min:2.70,max:3.25,step:0.05},
    {lbl:"Plate Width",key:"plateWidth",min:4.30,max:5.20,step:0.05},
    {lbl:"Angle",key:"angle",min:0,max:90,step:1,unit:"°"},
    {lbl:"Radius",key:"radius",min:0.3,max:0.9,step:0.01},
  ];
  fields.forEach(function(f){
    c.appendChild(makeSlider(f.lbl,state[f.key],f.min,f.max,f.step,f.unit||"",function(v){state[f.key]=v;rebuild();}));
  });
  c.appendChild(hr());c.appendChild(lbl("Rotation"));
  [{lbl:"X",key:"rotX"},{lbl:"Y",key:"rotY"},{lbl:"Z",key:"rotZ"}].forEach(function(f){
    c.appendChild(makeSlider(f.lbl,state[f.key],-180,180,1,"°",function(v){
      state[f.key]=v;
      rotRef.x=state.rotX*Math.PI/180;rotRef.y=state.rotY*Math.PI/180;
      if(group&&!animState.on){group.rotation.x=rotRef.x;group.rotation.y=rotRef.y;group.rotation.z=state.rotZ*Math.PI/180;}
    }));
  });
}

// ═══════════ ANIM TAB ═══════════
function renderAnimTab(){
  var c=tabContent;
  c.appendChild(makeToggle("Animate",animState.on,function(v){
    animState.on=v;state.animOn=v;
    if(v&&animState.lastT===null)animState.lastT=null;
    document.getElementById("badge").innerHTML=v?"<span class='anim-dot'></span>HeyMax &middot; Logo Generator":"HeyMax &middot; Logo Generator";
    renderTab();
  },"#6E1FFF"));
  c.appendChild(makeToggle("Mouse / Touch Parallax",animState.mouse,function(v){
    animState.mouse=v;state.mouseOn=v;
  },"#02818E"));
  if(animState.on){
    c.appendChild(hr());
    c.appendChild(makeSlider("Speed",animState.speed,0.05,2,0.05,"",function(v){animState.speed=v;}));
    var sub=document.createElement("span");sub.className="lbl";sub.style.marginTop="8px";sub.textContent="Param Ranges";c.appendChild(sub);
    c.appendChild(makeDual("Spacing",0.4,6,0.05,aniR.spacing[0],aniR.spacing[1],"",function(v){aniR.spacing[0]=v;},function(v){aniR.spacing[1]=v;}));
    c.appendChild(makeDual("Angle",0,90,1,aniR.angle[0],aniR.angle[1],"°",function(v){aniR.angle[0]=v;},function(v){aniR.angle[1]=v;}));
    c.appendChild(makeDual("Plate Width",4.3,5.2,0.05,aniR.width[0],aniR.width[1],"",function(v){aniR.width[0]=v;},function(v){aniR.width[1]=v;}));
    c.appendChild(makeDual("Length",2.70,3.25,0.05,aniR.length[0],aniR.length[1],"",function(v){aniR.length[0]=v;},function(v){aniR.length[1]=v;}));
  }
}

// ═══════════ EXPORT TAB ═══════════
function renderExportTab(){
  var c=tabContent;
  c.appendChild(lbl("Export"));
  var btn=document.createElement("button");btn.className="exp-btn primary";btn.textContent="↓ Capture";
  btn.onclick=doExport;c.appendChild(btn);
  if(state.exportData){
    var spec=state.exportData.spec;
    c.appendChild(hr());c.appendChild(lbl("Parameters"));
    var rows=[["Spacing",spec.shape.spacing],["Length",spec.shape.length],["Width",spec.shape.plateWidth],["Angle",spec.shape.angle+"°"],["Radius",spec.shape.radius],["Rot X",spec.rotation.x+"°"],["Rot Y",spec.rotation.y+"°"],["Background",spec.background]];
    rows.forEach(function(r){
      var row=document.createElement("div");row.style.cssText="display:flex;justify-content:space-between;margin-bottom:8px";
      row.innerHTML='<span style="font-family:var(--sans);font-size:12px;font-weight:500;color:var(--text-secondary)">'+r[0]+'</span><span style="font-family:var(--sans);font-size:12px;color:var(--text-muted)">'+r[1]+'</span>';
      c.appendChild(row);
    });
  }
}
function doExport(){
  if(!renderer)return;
  renderer.render(scene,camera);
  var canvas=renderer.domElement;
  var png=canvas.toDataURL("image/png");
  function toBlob(d){var p=d.split(","),mime=p[0].match(/:(.*?);/)[1],byt=atob(p[1]),arr=new Uint8Array(byt.length);for(var i=0;i<byt.length;i++)arr[i]=byt.charCodeAt(i);return new Blob([arr],{type:mime});}
  var pngUrl=URL.createObjectURL(toBlob(png));
  var specObj={generated:new Date().toISOString(),shape:{spacing:state.spacing,length:state.length,plateWidth:state.plateWidth,angle:state.angle,radius:state.radius},rotation:{x:Math.round(state.rotX),y:Math.round(state.rotY),z:Math.round(state.rotZ)},gradient:{R1:{ab:state.panelColors[0],dc:state.panelColors[1]},R2:{dc:state.panelColors[2],ef:state.panelColors[3]},R3:{ef:state.panelColors[4],gh:state.panelColors[5]},R4:{gh:state.panelColors[6],ji:state.panelColors[7]}},background:state.bg};
  var jsonUrl=URL.createObjectURL(new Blob([JSON.stringify(specObj,null,2)],{type:"application/json"}));
  state.exportData={png,pngUrl,jsonUrl,spec:specObj};
  var ov=document.getElementById("expOv");
  document.getElementById("expImg").src=png;
  var links=document.getElementById("expLinks");
  links.innerHTML="";
  [{label:"&#8595; PNG",url:pngUrl,dl:"heymax-logo.png"},{label:"&#8595; JSON",url:jsonUrl,dl:"heymax-spec.json"}].forEach(function(l){
    var a=document.createElement("a");a.className="exp-lnk";a.innerHTML=l.label;a.href=l.url;a.download=l.dl;links.appendChild(a);
  });
  ov.style.display="flex";
  renderTab();
}
document.getElementById("expOv").onclick=function(e){if(e.target===this)this.style.display="none";};
document.getElementById("expClose").onclick=function(){document.getElementById("expOv").style.display="none";};
document.getElementById("logoDlBtn").onclick=downloadLogo;

// ═══════════ BOOT ═══════════
renderTabs();renderTab();
initThree();
updateLogoParts();
</script>
